<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 뉴스 요약 대시보드</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#eef2ff', 100:'#e0e7ff', 300:'#a5b4fc', 500:'#6366f1', 600:'#4f46e5', 700:'#4338ca' }
          },
          fontFamily: { sans: ['"Noto Sans KR"','ui-sans-serif','system-ui','sans-serif'] }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Base ── */
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Noto Sans KR', sans-serif; background: #e6ebff; color: #1e1b4b; }

    /* ── Background ── */
    .page-bg {
      position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
      background: linear-gradient(145deg, #dde4ff 0%, #f0e8ff 50%, #deeeff 100%);
    }
    .page-bg .dot-grid {
      position: absolute; inset: 0;
      background-image: radial-gradient(rgba(99,102,241,0.22) 1px, transparent 1px);
      background-size: 28px 28px;
    }
    .page-bg .orb {
      position: absolute; border-radius: 50%; filter: blur(100px);
    }
    .orb-1 { width: 700px; height: 700px; background: #a5b4fc; opacity: 0.65;
              top: -200px; left: -150px; animation: orbFloat1 14s ease-in-out infinite; }
    .orb-2 { width: 500px; height: 500px; background: #7dd3fc; opacity: 0.55;
              bottom: -120px; right: -100px; animation: orbFloat2 17s ease-in-out infinite; }
    .orb-3 { width: 400px; height: 400px; background: #c4b5fd; opacity: 0.5;
              top: 45%; left: 42%; transform: translate(-50%,-50%); animation: orbFloat3 20s ease-in-out infinite; }
    @keyframes orbFloat1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(50px,-35px)} }
    @keyframes orbFloat2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-40px,50px)} }
    @keyframes orbFloat3 { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-50%) scale(1.12)} }

    /* All page content above background */
    body > *:not(.page-bg) { position: relative; z-index: 1; }

    /* ── Glass Surfaces ── */
    .glass {
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(18px) saturate(1.8);
      -webkit-backdrop-filter: blur(18px) saturate(1.8);
      border: 1px solid rgba(99,102,241,0.22);
    }
    .glass-card {
      background: rgba(255,255,255,0.84);
      backdrop-filter: blur(14px) saturate(1.6);
      -webkit-backdrop-filter: blur(14px) saturate(1.6);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 0.875rem;
      transition: box-shadow 0.25s ease, transform 0.25s ease, border-color 0.25s ease;
    }
    .glass-card:hover {
      box-shadow: 0 8px 32px rgba(99,102,241,0.2), 0 0 0 1px rgba(99,102,241,0.3);
      transform: translateY(-2px);
      border-color: rgba(99,102,241,0.35);
    }
    .glass-inner {
      background: rgba(99,102,241,0.05);
      border: 1px solid rgba(99,102,241,0.1);
      border-radius: 0.5rem;
    }

    /* ── Navigation Tabs ── */
    .tab-active {
      border-left: 3px solid #6366f1;
      background: rgba(99,102,241,0.08);
      color: #4338ca;
      font-weight: 600;
    }
    .tab-inactive { border-left: 3px solid transparent; color: #9ca3af; }
    .tab-inactive:hover { background: rgba(99,102,241,0.05); color: #6366f1; }

    /* ── Bookmark ── */
    .bookmark-active   { color: #6366f1; }
    .bookmark-inactive { color: #c7d2fe; }

    /* ── Discussion Tabs ── */
    .disc-tab-active   { background: rgba(99,102,241,0.1); color: #4338ca; border-color: #6366f1; font-weight: 600; }
    .disc-tab-inactive { background: white; color: #9ca3af; border-color: #e5e7eb; }
    .disc-tab-inactive:hover { background: #f5f3ff; }

    /* ── Archive Tree ── */
    .tree-chevron { transition: transform 0.18s ease; }
    .tree-chevron.open { transform: rotate(90deg); }
    .tree-row { transition: background-color 0.12s; }
    .tree-row:hover { background: rgba(99,102,241,0.06); }

    /* ── Animations ── */
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position:  400px 0; }
    }
    .skeleton-line {
      background: linear-gradient(90deg, #c7d2fe 25%, #a5b4fc 50%, #c7d2fe 75%);
      background-size: 800px 100%;
      animation: shimmer 1.6s infinite;
      border-radius: 0.375rem;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.25); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(99,102,241,0.45); }

    /* ── Form inputs ── */
    .dark-input {
      background: rgba(255,255,255,0.8);
      border: 1px solid rgba(99,102,241,0.2);
      color: #1e1b4b;
      border-radius: 0.5rem;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      width: 100%;
      font-size: 0.875rem;
      padding: 0.5rem 0.75rem;
    }
    .dark-input::placeholder { color: #c4b5fd; }
    .dark-input:focus {
      border-color: rgba(99,102,241,0.5);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
    }
    textarea.dark-input { resize: none; }

    /* ── Buttons ── */
    .btn-primary {
      display: inline-flex; align-items: center; gap: 0.375rem;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #fff; font-size: 0.75rem; font-weight: 600;
      padding: 0.5rem 1rem; border-radius: 0.5rem;
      transition: opacity 0.15s, transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 14px rgba(99,102,241,0.28);
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(99,102,241,0.38); }
    .btn-ghost {
      display: inline-flex; align-items: center; gap: 0.375rem;
      color: #6366f1; font-size: 0.75rem; font-weight: 600;
      padding: 0.5rem 1rem; border-radius: 0.5rem;
      border: 1px solid rgba(99,102,241,0.3);
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-ghost:hover { background: rgba(99,102,241,0.07); border-color: rgba(99,102,241,0.5); }
    .btn-sm {
      display: inline-flex; align-items: center; gap: 0.25rem;
      font-size: 0.7rem; padding: 0.375rem 0.75rem; border-radius: 0.4rem;
    }

    /* ── Badge ── */
    .badge { font-size: 0.7rem; font-weight: 600; padding: 0.15rem 0.5rem; border-radius: 9999px; }
    .badge-brand { background: #ede9fe; color: #4338ca; border: 1px solid #c4b5fd; }
    .badge-gray  { background: #f3f4f6; color: #9ca3af; border: 1px solid #e5e7eb; }

    /* ── Category header gradient text ── */
    .gradient-text {
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 50%, #7c3aed 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Divider ── */
    .divider { border-color: rgba(99,102,241,0.1); }

    /* ── OpenAI Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(30,27,75,0.38);
      backdrop-filter: blur(7px);
      -webkit-backdrop-filter: blur(7px);
      display: flex; align-items: center; justify-content: center;
      animation: fadeIn .18s ease both;
    }
    .modal-overlay.hidden { display: none !important; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin .8s linear infinite; }

    /* ── Chatbot Panel ── */
    #chatbot-panel { transition: opacity .18s ease, transform .18s ease; transform-origin: top right; }
    #chatbot-panel.hidden { display: none !important; }
    .chat-msg-user { align-self: flex-end; max-width: 86%; }
    .chat-msg-ai   { align-self: flex-start; max-width: 86%; }
    .chat-bubble-user {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #fff; border-radius: .875rem .875rem .125rem .875rem;
      padding: .6rem .875rem; font-size: .8rem; line-height: 1.55; word-break: break-word;
    }
    .chat-bubble-ai {
      background: rgba(255,255,255,.88); color: #374151;
      border: 1px solid rgba(99,102,241,.13);
      border-radius: .875rem .875rem .875rem .125rem;
      padding: .6rem .875rem; font-size: .8rem; line-height: 1.55; word-break: break-word;
    }
    .chat-typing { display: flex; align-items: center; gap: 3px; padding: .5rem .75rem; }
    .chat-typing span {
      display: inline-block; width: 7px; height: 7px; border-radius: 50%;
      background: #a5b4fc; animation: typingDot 1.1s infinite;
    }
    .chat-typing span:nth-child(2) { animation-delay: .18s; }
    .chat-typing span:nth-child(3) { animation-delay: .36s; }
    @keyframes typingDot { 0%,60%,100% { transform:translateY(0); opacity:.7; } 30% { transform:translateY(-5px); opacity:1; } }
  </style>
</head>
<body class="min-h-screen">

  <!-- ── Background ─────────────────────────────────────────────────── -->
  <div class="page-bg" aria-hidden="true">
    <div class="dot-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- ── Header ─────────────────────────────────────────────────────── -->
  <header style="background:rgba(255,255,255,0.85);backdrop-filter:blur(20px) saturate(1.8);-webkit-backdrop-filter:blur(20px) saturate(1.8);border-bottom:1px solid rgba(99,102,241,0.12);" class="sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0"
          style="background:linear-gradient(135deg,#6366f1,#8b5cf6);box-shadow:0 4px 16px rgba(99,102,241,0.35)">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
          </svg>
        </div>
        <div>
          <h1 class="text-sm leading-tight" style="font-weight:700;color:#1e1b4b">AI 뉴스 요약 대시보드</h1>
          <p class="text-xs" style="color:#6366f1;letter-spacing:.04em">Financial &amp; Tech Intelligence</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <button onclick="toggleChatbot()" id="chatbot-toggle-btn" title="AI 챗봇 열기/닫기"
          class="flex items-center gap-2 text-xs px-3 py-1.5 rounded-full transition"
          style="color:#6b7280;background:rgba(99,102,241,0.06);border:1px solid rgba(99,102,241,0.15)">
          <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
          </svg>
          <span id="chatbot-btn-label">챗봇</span>
        </button>
        <button onclick="showOpenAiModal()" title="OpenAI API 키 설정"
          class="flex items-center gap-2 text-xs px-3 py-1.5 rounded-full transition"
          style="color:#6b7280;background:rgba(99,102,241,0.06);border:1px solid rgba(99,102,241,0.15)">
          <div id="ai-status-dot" class="w-2 h-2 rounded-full flex-shrink-0" style="background:#f59e0b;box-shadow:0 0 6px #f59e0b"></div>
          <span id="ai-status-text">AI 키 설정</span>
        </button>
        <div class="w-2 h-2 rounded-full" style="background:#10b981;box-shadow:0 0 6px #10b981" title="연결됨"></div>
        <span id="last-updated" class="text-xs px-3 py-1.5 rounded-full"
          style="color:#6b7280;background:rgba(99,102,241,0.06);border:1px solid rgba(99,102,241,0.15)">Last updated: —</span>
      </div>
    </div>
  </header>

  <!-- ── OpenAI API Key Modal ──────────────────────────────────────────── -->
  <div id="openai-modal" class="modal-overlay hidden">
    <div class="glass-card w-full mx-4 p-8" style="max-width:420px;animation:fadeIn .2s ease both;box-shadow:0 24px 80px rgba(99,102,241,.28)">
      <div class="flex items-center gap-3 mb-6">
        <div class="w-11 h-11 rounded-xl flex items-center justify-center flex-shrink-0"
          style="background:linear-gradient(135deg,#6366f1,#8b5cf6);box-shadow:0 4px 16px rgba(99,102,241,.35)">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h14a2 2 0 012 2v10a2 2 0 01-2 2h-2"/>
          </svg>
        </div>
        <div>
          <h2 class="text-sm" style="font-weight:700;color:#1e1b4b">OpenAI API 키 설정</h2>
          <p class="text-xs mt-0.5" style="color:#6366f1">AI 뉴스 자동 요약을 활성화합니다</p>
        </div>
      </div>
      <div class="rounded-lg px-4 py-3 mb-5" style="background:rgba(99,102,241,0.06);border:1px solid rgba(99,102,241,0.15)">
        <p class="text-xs leading-relaxed" style="color:#6b7280">
          API 키를 입력하면 각 카테고리 뉴스를 <strong style="color:#4338ca">GPT-4o-mini</strong>로 자동 요약합니다.
          키는 이 브라우저에만 저장되며 서버로 전송되지 않습니다.
        </p>
      </div>
      <div class="mb-5">
        <label class="text-xs mb-1.5 block" style="font-weight:600;color:#4338ca">API Key</label>
        <div class="relative">
          <input id="openai-key-input" type="password" placeholder="sk-..." class="dark-input pr-10"
            onkeydown="if(event.key==='Enter')saveOpenAiKey()"/>
          <button onclick="toggleKeyVisibility()" type="button"
            class="absolute right-3 top-1/2 -translate-y-1/2 p-0.5" style="color:#9ca3af" title="보기/숨기기">
            <svg id="key-eye-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M2.458 12C3.732 5.943 7.523 3 12 3c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>
        <p class="text-xs mt-1.5" style="color:#9ca3af">
          키 발급:
          <a href="https://platform.openai.com/api-keys" target="_blank" rel="noopener noreferrer"
            style="color:#6366f1">platform.openai.com</a>
        </p>
      </div>
      <div class="flex items-center gap-3">
        <button onclick="saveOpenAiKey()" class="btn-primary flex-1 justify-center" style="padding:.625rem 1rem">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
          </svg>
          저장 및 적용
        </button>
        <button onclick="closeOpenAiModal()" class="btn-ghost flex-1 justify-center" style="padding:.625rem 1rem">나중에</button>
      </div>
      <div id="openai-key-delete-row" class="mt-4 text-center hidden">
        <button onclick="deleteOpenAiKey()" class="text-xs transition" style="color:#d1d5db"
          onmouseenter="this.style.color='#ef4444'" onmouseleave="this.style.color='#d1d5db'">
          저장된 키 삭제
        </button>
      </div>
    </div>
  </div>

  <!-- ── Chatbot Panel ────────────────────────────────────────────────── -->
  <div id="chatbot-panel" class="hidden"
    style="position:fixed;top:68px;right:24px;z-index:50;width:380px">
    <div class="glass-card" style="height:510px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(99,102,241,.22)">
      <!-- 패널 헤더 -->
      <div style="padding:.875rem 1.125rem;border-bottom:1px solid rgba(99,102,241,.12);display:flex;align-items:center;gap:.625rem;flex-shrink:0">
        <div style="width:2rem;height:2rem;border-radius:.625rem;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 12px rgba(99,102,241,.3)">
          <svg style="width:1rem;height:1rem;color:#fff" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
          </svg>
        </div>
        <div style="flex:1;min-width:0">
          <p style="font-size:.8rem;font-weight:700;color:#1e1b4b;line-height:1.2">AI 챗봇</p>
          <p style="font-size:.68rem;color:#6366f1">GPT-4o-mini · 뉴스 컨텍스트 기반</p>
        </div>
        <button onclick="clearChat()" title="대화 초기화"
          style="color:#9ca3af;padding:.25rem;border-radius:.375rem;transition:color .15s"
          onmouseenter="this.style.color='#6366f1'" onmouseleave="this.style.color='#9ca3af'">
          <svg style="width:1rem;height:1rem" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
          </svg>
        </button>
        <button onclick="toggleChatbot()" title="닫기"
          style="color:#9ca3af;padding:.25rem;border-radius:.375rem;transition:color .15s"
          onmouseenter="this.style.color='#ef4444'" onmouseleave="this.style.color='#9ca3af'">
          <svg style="width:1rem;height:1rem" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <!-- 메시지 영역 -->
      <div id="chat-messages"
        style="flex:1;overflow-y:auto;padding:.875rem;display:flex;flex-direction:column;gap:.625rem;scroll-behavior:smooth">
      </div>
      <!-- 입력 영역 -->
      <div style="padding:.75rem .875rem;border-top:1px solid rgba(99,102,241,.08);flex-shrink:0;background:rgba(245,246,255,.6)">
        <div id="chat-input-wrap" style="background:rgba(255,255,255,.92);border:1.5px solid rgba(99,102,241,.18);border-radius:1rem;padding:.625rem .625rem .5rem .875rem;display:flex;flex-direction:column;gap:.375rem;transition:border-color .18s,box-shadow .18s;box-shadow:0 2px 10px rgba(99,102,241,.07)">
          <textarea id="chat-input" rows="1" maxlength="500"
            placeholder="뉴스에 대해 질문하세요…"
            style="resize:none;width:100%;background:transparent;border:none;outline:none;font-family:inherit;font-size:.8rem;color:#374151;line-height:1.55;min-height:1.4rem;max-height:5rem;overflow-y:auto;"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat();}"
            oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,80)+'px'"
            onfocus="document.getElementById('chat-input-wrap').style.borderColor='rgba(99,102,241,.5)';document.getElementById('chat-input-wrap').style.boxShadow='0 0 0 3px rgba(99,102,241,.1),0 2px 10px rgba(99,102,241,.12)'"
            onblur="document.getElementById('chat-input-wrap').style.borderColor='rgba(99,102,241,.18)';document.getElementById('chat-input-wrap').style.boxShadow='0 2px 10px rgba(99,102,241,.07)'"></textarea>
          <div style="display:flex;align-items:center;justify-content:space-between">
            <span style="font-size:.62rem;color:#c4b5fd;user-select:none">Shift+Enter 줄바꿈</span>
            <button id="chat-send-btn" onclick="sendChat()"

    // ── OpenAI 요약 ───────────────────────────────────────────────────
    async function summarizeWithOpenAI(articles, cat) {
      const items = articles.map((a, i) => {
        const desc = (a.rawDesc || '').slice(0, 400);
        return `${i + 1}. 제목: ${a.title}\n내용: ${desc}`;
      }).join('\n\n');

      const res = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${openAiKey}` },
        body: JSON.stringify({
          model: 'gpt-4o-mini',
          messages: [
            { role: 'system', content: '당신은 뉴스 요약 전문가입니다. 간결하고 핵심적인 한국어 요약을 제공합니다.' },
            { role: 'user',   content: `다음 ${CAT_LABELS[cat] || cat} 뉴스 기사들을 각각 3문장으로 핵심만 한국어로 요약하세요.\n반드시 JSON 배열만 출력하세요. 형식: [["문장1","문장2","문장3"], ...]\n\n${items}` }
          ],
          max_tokens: 1500,
          temperature: 0.3
        })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error?.message || `HTTP ${res.status}`);
      }
      const data = await res.json();
      const content = data.choices?.[0]?.message?.content || '';
      const match = content.match(/\[[\s\S]*\]/);
      if (!match) throw new Error('응답 파싱 실패');
      return JSON.parse(match[0]);
    }

    // ── 유틸 ──────────────────────────────────────────────────────────
    function decodeHtmlEntities(str) {
      const ta = document.createElement('textarea'); ta.innerHTML = str; return ta.value;
    }
    function parseDescription(raw) {
      if (!raw) return [];
      const stripped = raw.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
      const text = decodeHtmlEntities(stripped).replace(/^[▲△▶◆■●※\s]+/,'').replace(/\s+/g,' ').trim();
      if (!text) return [];
      const sentences = text.split(/(?<=[.!?…])\s+/).map(s=>s.trim()).filter(s=>s.length>8);
      if (sentences.length>=2) return sentences.slice(0,3);
      if (text.length>40) {
        const words=text.split(' '), third=Math.ceil(words.length/3);
        return [words.slice(0,third).join(' '),words.slice(third,third*2).join(' '),words.slice(third*2).join(' ')]
          .filter(s=>s.length>4).slice(0,3);
      }
      return [text];
    }
    function extractDomain(url) { try{return new URL(url).hostname.replace(/^www\./,'')}catch{return '뉴스'} }
    function relativeTime(pubDate) {
      if (!pubDate) return '';
      const diff=Date.now()-new Date(pubDate).getTime(), m=Math.floor(diff/60000), h=Math.floor(diff/3600000), d=Math.floor(diff/86400000);
      if(m<1)return '방금 전'; if(m<60)return `${m}분 전`; if(h<24)return `${h}시간 전`; return `${d}일 전`;
    }

    }

    // ── RSS fetch (멀티 피드 병렬) ────────────────────────────────────

        results.forEach((result, fi) => {
          if (result.status !== 'fulfilled') return;
          const doc = new DOMParser().parseFromString(result.value, 'text/xml');
          [...doc.querySelectorAll('item')].slice(0, 5).forEach((item, idx) => {
            const get = tag => { const el = item.querySelector(tag); return el ? el.textContent.trim() : ''; };
            const url = get('link') || get('guid');
            const rawDesc = get('description');
            const pubDate = get('pubDate');
            allArticles.push({
              id: `${cat}_${fi}_${idx}`,
              title: get('title'), source: extractDomain(url || feeds[fi]),
              time: relativeTime(pubDate), pubMs: pubDate ? new Date(pubDate).getTime() : 0,
              url, tag: categoryMeta[cat].tag,
              summary: parseDescription(rawDesc), rawDesc
            });
          });
        });

        if (!allArticles.length) throw new Error('No articles from any feed');

        // 중복 제거 (제목 앞 20자 기준), 최신순 정렬, 최대 9개
        const seen = new Set();
        allArticles = allArticles
          .filter(a => { const k = a.title.slice(0, 20); if (seen.has(k)) return false; seen.add(k); return true; })
          .sort((a, b) => b.pubMs - a.pubMs)
          .slice(0, 9);

        liveCache[cat] = allArticles;
        updateTimestamp(); updateTabCount(cat, allArticles.length); renderCards(allArticles);
        saveToArchive(allArticles, cat);

        // OpenAI 요약
        if (openAiKey) {
          setAiBanner('loading', 'AI가 뉴스를 분석하고 있습니다…');
          try {
            const summaries = await summarizeWithOpenAI(allArticles, cat);
            if (Array.isArray(summaries)) {
              summaries.forEach((s, i) => {
                if (allArticles[i] && Array.isArray(s) && s.length) allArticles[i].summary = s;
              });
              liveCache[cat] = allArticles;
              renderCards(allArticles);
              setAiBanner('done', 'AI 요약 완료');
            }
          } catch(e) {
            console.warn('[OpenAI]', e);
            setAiBanner('error', 'AI 요약 실패: ' + e.message);
          }
        }
      } catch(err) { console.warn('[RSS]', err); showError(cat); }
    }

    async function saveToArchive(articles,cat) {
      const batchId=crypto.randomUUID();
      const {error}=await sb.from('news_archive').insert(
        articles.map(a=>({batch_id:batchId,category:cat,title:a.title,source:a.source||'',url:a.url||'',summary:a.summary||[],tag:a.tag||''}))
      );
      if(error)console.warn('[Archive]',error.message);
    }

    // ── 아카이브 트리: 카테고리 토글 ─────────────────────────────────
    async function toggleArchiveTreeCat(cat) {
      const state = archiveTreeCats[cat];
      state.isOpen = !state.isOpen;
      if (state.isOpen && state.dateList===null) {
        state.dateList='loading'; renderArchiveTree();
        const {data,error}=await sb.from('news_archive').select('batch_id,saved_at').eq('category',cat).order('saved_at',{ascending:false}).limit(2000);
        if(error||!data){ state.dateList=[]; }
        else {
          const batchMap={};
          data.forEach(row=>{
            if(!batchMap[row.batch_id])batchMap[row.batch_id]={batch_id:row.batch_id,saved_at:row.saved_at,count:0};
            batchMap[row.batch_id].count++;
          });
          const byDate={};
          Object.values(batchMap).forEach(b=>{
            const kst=toKST(b.saved_at), date=kst.slice(0,10);
            if(!byDate[date])byDate[date]=[]; byDate[date].push({...b,kst});
          });
          state.dateList=Object.entries(byDate).sort(([a],[b])=>b.localeCompare(a))
            .map(([date,batches])=>({date,batches:batches.sort((a,b)=>b.saved_at.localeCompare(a.saved_at))}));
        }
      }
      renderArchiveTree();
    }

    function toggleArchiveTreeDate(cat,date) {
      const state=archiveTreeCats[cat]; state.openDate=state.openDate===date?null:date; renderArchiveTree();
    }

    function renderDiscussions(posts) {
      const list=document.getElementById('disc-list'); if(!list)return;
      if(!posts?.length){

        </div>`;

    async function submitDiscussion() {
      const nickname=(document.getElementById('disc-nickname')?.value||'').trim();
      const content=(document.getElementById('disc-content')?.value||'').trim();
      if(!nickname){alert('닉네임을 입력해주세요.');return;}
      if(!content){alert('내용을 입력해주세요.');return;}
      const btn=document.querySelector('[onclick="submitDiscussion()"]');
      if(btn){btn.disabled=true;btn.textContent='게시 중...';}
      const payload={nickname,content,likes:0};
      if(articleContext){payload.news_title=articleContext.title;payload.news_url=articleContext.url||'';}
      const {error}=await sb.from('discussions').insert(payload);
      if(error){alert('게시 실패: '+error.message);if(btn){btn.disabled=false;btn.textContent='게시하기';}}
      else await fetchDiscussions();
    }

    async function toggleDiscLike(id,btn) {
      if(likedPosts.has(id))return;
      likedPosts.add(id); localStorage.setItem('likedPosts',JSON.stringify([...likedPosts]));
      const countEl=btn.querySelector('.like-count'), newCount=parseInt(btn.dataset.likes||'0')+1;
      if(countEl)countEl.textContent=newCount; btn.dataset.likes=newCount;
      btn.style.cssText='border-color:#6366f1;color:#6366f1;background:rgba(99,102,241,.1)';
      btn.querySelector('svg').setAttribute('fill','currentColor');
      await sb.from('discussions').update({likes:newCount}).eq('id',id);
    }

    // ── 토론 수정/삭제 ────────────────────────────────────────────────
    function editDiscussion(id) {
      const contentEl=document.getElementById(`disc-content-${id}`); if(!contentEl)return;
      const original=contentEl.dataset.original||contentEl.textContent;
      contentEl.outerHTML=`
        <div id="disc-edit-${id}" class="mt-1" data-original="${escHtml(original)}">
          <textarea id="disc-edit-ta-${id}" maxlength="500" rows="3" class="dark-input"
            style="border-color:rgba(99,102,241,.4)">${escHtml(original)}</textarea>
          <div class="flex items-center gap-2 mt-2">
            <button onclick="saveDiscussionEdit('${id}')" class="btn-primary btn-sm">저장</button>
            <button onclick="cancelDiscussionEdit('${id}')" class="text-xs px-3 py-1.5 rounded-lg transition"
              style="color:#9ca3af;border:1px solid rgba(99,102,241,.2)"
              onmouseenter="this.style.color='#94a3b8'" onmouseleave="this.style.color='#475569'">취소</button>
          </div>
        </div>`;
    }

    async function saveDiscussionEdit(id) {
      const ta=document.getElementById(`disc-edit-ta-${id}`); if(!ta)return;
      const newContent=ta.value.trim();
      if(!newContent){alert('내용을 입력해주세요.');return;}
      const {error}=await sb.from('discussions').update({content:newContent}).eq('id',id);
      if(error){alert('수정 실패: '+error.message);return;}
      const editEl=document.getElementById(`disc-edit-${id}`);
      if(editEl)editEl.outerHTML=`<p class="text-sm leading-relaxed whitespace-pre-wrap mt-1" style="color:#6b7280"
        id="disc-content-${id}" data-original="${escHtml(newContent)}">${escHtml(newContent)}</p>`;
    }

    function cancelDiscussionEdit(id) {
      const editEl=document.getElementById(`disc-edit-${id}`); if(!editEl)return;
      const text=editEl.dataset.original||'';
      editEl.outerHTML=`<p class="text-sm leading-relaxed whitespace-pre-wrap mt-1" style="color:#6b7280"
        id="disc-content-${id}" data-original="${escHtml(text)}">${escHtml(text)}</p>`;
    }

    async function deleteDiscussion(id) {
      if(!confirm('이 게시글을 삭제하시겠습니까?'))return;
      const {error}=await sb.from('discussions').delete().eq('id',id);
      if(error){alert('삭제 실패: '+error.message);return;}
      document.querySelector(`article[data-disc-id="${id}"]`)?.remove();
      const list=document.getElementById('disc-list');
      if(list&&!list.querySelector('article')){
        list.innerHTML=`<div class="glass-card p-16 text-center">
          <div class="text-4xl mb-3">💬</div>
          <p class="text-xs" style="color:#9ca3af">게시글이 없습니다.</p></div>`;
      }
    }

    // ── 북마크 ────────────────────────────────────────────────────────
    function showBookmarks() {
      const saved=Object.values(liveCache).flat().filter(n=>bookmarkedIds.has(n.id));
      document.getElementById('cat-title').textContent='북마크';
      document.getElementById('cat-subtitle').textContent='저장한 뉴스 모아보기';
      document.querySelectorAll('#category-nav button[data-cat]').forEach(btn=>{

    function toggleBookmark(id,btn) {
      if(bookmarkedIds.has(id)){
        bookmarkedIds.delete(id); btn.classList.replace('bookmark-active','bookmark-inactive');
        btn.querySelector('svg').setAttribute('fill','none');
        btn.querySelector('.bm-label').textContent='북마크'; btn.title='북마크 추가';
      } else {
        bookmarkedIds.add(id); btn.classList.replace('bookmark-inactive','bookmark-active');
        btn.querySelector('svg').setAttribute('fill','currentColor');
        btn.querySelector('.bm-label').textContent='북마크됨'; btn.title='북마크 제거';
      }
    }

      document.getElementById('news-container').innerHTML=`

          <div class="text-4xl mb-3">⚠️</div>
          <p class="text-sm mb-1" style="font-weight:600;color:#1e1b4b">뉴스를 불러오지 못했습니다</p>
          <p class="text-xs mb-5" style="color:#9ca3af">RSS 서버 연결 실패. 잠시 후 다시 시도해주세요.</p>

    // ── 챗봇 ──────────────────────────────────────────────────────────
    let chatHistory = [];
    let chatOpen = false;

    function chatWelcomeHtml() {
      return `<div class="chat-msg-ai">
        <div class="chat-bubble-ai">
          안녕하세요! AI 뉴스 챗봇입니다.<br>
          현재 대시보드에 로드된 뉴스 내용을 바탕으로 질문에 답변해 드립니다.<br><br>
          예) <em style="color:#6366f1">오늘 경제 뉴스 요약해줘</em><br>
          예) <em style="color:#6366f1">리스크 관련 주요 이슈는?</em>
        </div>
      </div>`;
    }

    function toggleChatbot() {
      chatOpen = !chatOpen;
      const panel  = document.getElementById('chatbot-panel');
      const label  = document.getElementById('chatbot-btn-label');
      const toggle = document.getElementById('chatbot-toggle-btn');
      if (chatOpen) {
        panel.classList.remove('hidden');
        if (!document.getElementById('chat-messages').innerHTML.trim()) {
          document.getElementById('chat-messages').innerHTML = chatWelcomeHtml();
        }
        if (label) label.textContent = '챗봇 닫기';
        if (toggle) { toggle.style.background='rgba(99,102,241,.12)'; toggle.style.borderColor='rgba(99,102,241,.35)'; toggle.style.color='#4338ca'; }
        setTimeout(() => document.getElementById('chat-input')?.focus(), 100);
      } else {
        panel.classList.add('hidden');
        if (label) label.textContent = '챗봇';
        if (toggle) { toggle.style.background='rgba(99,102,241,0.06)'; toggle.style.borderColor='rgba(99,102,241,0.15)'; toggle.style.color='#6b7280'; }
      }
    }

    function clearChat() {
      chatHistory = [];
      document.getElementById('chat-messages').innerHTML = chatWelcomeHtml();
    }

    function buildChatSystemPrompt() {
      const sections = Object.entries(liveCache).map(([cat, articles]) => {
        if (!articles?.length) return '';
        const name = CAT_LABELS[cat] || cat;
        const lines = articles.map(a =>
          `  - ${a.title}: ${(a.summary || []).join(' ')}`
        ).join('\n');
        return `[${name}]\n${lines}`;
      }).filter(Boolean).join('\n\n');

      return `당신은 뉴스 대시보드의 AI 챗봇입니다. 아래 현재 로드된 뉴스를 참고해 사용자 질문에 한국어로 친절하고 간결하게 답변하세요.

현재 뉴스:
${sections || '아직 뉴스가 로드되지 않았습니다.'}

지침:
- 뉴스 기반 질문에는 구체적 내용을 포함해 답변하세요.
- 일반 질문도 유연하게 답변하세요.
- 답변은 5문장 이내로 간결하게 유지하세요.`;
    }

    function appendChatMsg(role, html) {
      const msgs = document.getElementById('chat-messages');
      if (!msgs) return;
      const div = document.createElement('div');
      div.className = role === 'user' ? 'chat-msg-user' : 'chat-msg-ai';
      div.innerHTML = `<div class="${role === 'user' ? 'chat-bubble-user' : 'chat-bubble-ai'}">${html}</div>`;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function showChatTyping() {
      const msgs = document.getElementById('chat-messages');
      if (!msgs || document.getElementById('chat-typing')) return;
      const div = document.createElement('div');
      div.className = 'chat-msg-ai'; div.id = 'chat-typing';
      div.innerHTML = `<div class="chat-bubble-ai chat-typing"><span></span><span></span><span></span></div>`;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function hideChatTyping() { document.getElementById('chat-typing')?.remove(); }

    async function sendChat() {
      if (!openAiKey) { showOpenAiModal(); return; }
      const input = document.getElementById('chat-input');
      const text = input?.value.trim();
      if (!text) return;

      input.value = ''; input.style.height = 'auto';
      input.disabled = true;
      const sendBtn = document.getElementById('chat-send-btn');
      sendBtn.disabled = true;
      sendBtn.style.opacity = '.4';
      sendBtn.style.cursor = 'not-allowed';

      appendChatMsg('user', escHtml(text).replace(/\n/g, '<br>'));
      chatHistory.push({ role: 'user', content: text });
      showChatTyping();

      try {
        const res = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${openAiKey}` },
          body: JSON.stringify({
            model: 'gpt-4o-mini',
            messages: [
              { role: 'system', content: buildChatSystemPrompt() },
              ...chatHistory.slice(-12)
            ],
            max_tokens: 700,
            temperature: 0.7
          })
        });
        if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error?.message || `HTTP ${res.status}`); }
        const data = await res.json();
        const reply = data.choices?.[0]?.message?.content || '응답을 받지 못했습니다.';
        chatHistory.push({ role: 'assistant', content: reply });
        hideChatTyping();
        appendChatMsg('assistant', escHtml(reply).replace(/\n/g, '<br>'));
      } catch(e) {
        hideChatTyping();
        appendChatMsg('assistant', `<span style="color:#ef4444">오류: ${escHtml(e.message)}</span>`);
      } finally {
        input.disabled = false;
        const sb = document.getElementById('chat-send-btn');
        sb.disabled = false; sb.style.opacity = '1'; sb.style.cursor = '';
        input.focus();
      }
    }

    updateAiKeyStatus();
    if (openAiKey) {
      fetchNews('economy');
    } else {
      showOpenAiModal();
    }
  </script>
</body>
</html>
