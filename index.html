<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 뉴스 요약 대시보드</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { brand: { 50:'#f0f4ff',100:'#e0eaff',500:'#3b5bdb',600:'#2f4ac4',700:'#2340ae' } },
          fontFamily: { sans: ['"Noto Sans KR"','ui-sans-serif','system-ui','sans-serif'] }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Noto Sans KR', sans-serif; }
    .card-hover { transition: box-shadow 0.2s ease, transform 0.2s ease; }
    .card-hover:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.09); transform: translateY(-2px); }
    .tab-active   { border-left: 3px solid #3b5bdb; background: #f0f4ff; color: #3b5bdb; font-weight: 600; }
    .tab-inactive { border-left: 3px solid transparent; color: #6b7280; }
    .tab-inactive:hover { background: #f9fafb; color: #374151; }
    .bookmark-active   { color: #3b5bdb; }
    .bookmark-inactive { color: #9ca3af; }
    .disc-tab-active   { background: #f0f4ff; color: #3b5bdb; border-color: #3b5bdb; font-weight: 600; }
    .disc-tab-inactive { background: white; color: #6b7280; border-color: #e5e7eb; }
    .disc-tab-inactive:hover { background: #f9fafb; }
    .tree-chevron { transition: transform 0.18s ease; }
    .tree-chevron.open { transform: rotate(90deg); }
    .tree-row { transition: background-color 0.1s; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <header class="bg-white border-b border-gray-200 sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-brand-500 rounded-lg flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
          </svg>
        </div>
        <div>
          <h1 class="text-base text-gray-900 leading-tight" style="font-weight:700">뉴스 요약 대시보드</h1>
          <p class="text-xs text-gray-400">Financial & Tech Intelligence</p>
        </div>
      </div>
      <span id="last-updated" class="text-xs text-gray-400 bg-gray-100 px-3 py-1 rounded-full">Last updated: —</span>
    </div>
  </header>

  <div class="max-w-7xl mx-auto px-6 py-6 flex gap-6">

    <!-- ── Left Sidebar ─────────────────────────────────────────────── -->
    <aside class="w-52 flex-shrink-0">
      <div class="bg-white rounded-xl border border-gray-200 overflow-hidden sticky top-24">
        <div class="px-4 py-3 border-b border-gray-100">
          <p class="text-xs text-gray-400 uppercase tracking-widest" style="font-weight:600">카테고리</p>
        </div>
        <nav id="category-nav" class="py-2">
          <button onclick="switchCategory('economy')" data-cat="economy"
            class="tab-active w-full text-left px-4 py-3 text-sm transition-all flex items-center gap-3">
            <span class="text-lg">📈</span><span>경제</span>
            <span class="ml-auto text-xs bg-brand-100 text-brand-500 px-2 py-0.5 rounded-full" style="font-weight:500"><span class="tab-count">-</span></span>
          </button>
          <button onclick="switchCategory('tech')" data-cat="tech"
            class="tab-inactive w-full text-left px-4 py-3 text-sm transition-all flex items-center gap-3">
            <span class="text-lg">💡</span><span>테크</span>
            <span class="ml-auto text-xs bg-gray-100 text-gray-400 px-2 py-0.5 rounded-full" style="font-weight:500"><span class="tab-count">-</span></span>
          </button>
          <button onclick="switchCategory('risk')" data-cat="risk"
            class="tab-inactive w-full text-left px-4 py-3 text-sm transition-all flex items-center gap-3">
            <span class="text-lg">🛡️</span><span>리스크 관리</span>

          <!-- ── 아카이브 트리 ──────────────────────────────────────── -->
          <button onclick="toggleArchiveTree()" data-cat="archive"
            class="tab-inactive w-full text-left px-4 py-3 text-sm transition-all flex items-center gap-3">

            <span>아카이브</span>
            <svg id="archive-chevron" class="tree-chevron ml-auto w-4 h-4 text-gray-400 flex-shrink-0"
              fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
          </button>
          <div id="archive-tree-container" class="hidden">
            <div id="archive-tree-body" class="bg-gray-50 border-t border-gray-100 py-1"></div>
          </div>
          <!-- ────────────────────────────────────────────────────────── -->

          <button onclick="switchCategory('discussion')" data-cat="discussion"
            class="tab-inactive w-full text-left px-4 py-3 text-sm transition-all flex items-center gap-3">
            <span class="text-lg">💬</span><span>토론 게시판</span>
            <span class="ml-auto text-xs bg-gray-100 text-gray-400 px-2 py-0.5 rounded-full" style="font-weight:500"><span class="tab-count">-</span></span>
          </button>
        </nav>
        <div class="border-t border-gray-100 px-4 py-3">
          <button onclick="showBookmarks()"
            class="w-full text-left text-sm text-gray-400 hover:text-brand-500 transition flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/>
            </svg>
            북마크 모아보기
          </button>
        </div>
      </div>

    <!-- ── Right Content ────────────────────────────────────────────── -->
    <main class="flex-1 min-w-0">
      <div class="mb-5 flex items-center justify-between">
        <div>
          <h2 id="cat-title" class="text-xl text-gray-900" style="font-weight:700">경제</h2>
          <p id="cat-subtitle" class="text-sm text-gray-400 mt-0.5">글로벌 경제 동향 실시간 뉴스</p>
        </div>
        <div id="sort-control" class="flex items-center gap-2">
          <span class="text-xs text-gray-400">정렬:</span>
          <select class="text-xs border border-gray-200 rounded-lg px-2 py-1 text-gray-600 bg-white focus:outline-none focus:ring-2 focus:ring-brand-500">
            <option>최신순</option><option>관련도순</option>
          </select>
        </div>
      </div>
      <div id="news-container" class="flex flex-col gap-4"></div>
    </main>
  </div>

  <script>
    const SUPABASE_URL = 'https://zpamwbrbvprlulzxrbkr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpwYW13YnJidnBybHVsenhyYmtyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MjUzNjYsImV4cCI6MjA5NTQwMTM2Nn0.HULOQVq_SziDWSQb8wXj17EItQwSxkl6jkR4RXAsCTw';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let likedPosts = new Set(JSON.parse(localStorage.getItem('likedPosts') || '[]'));

    const PROXY = 'https://api.allorigins.win/raw?url=';
    const categoryMeta = {
      economy:    { title: '경제',        subtitle: '글로벌 경제 동향 실시간 뉴스',       tag: '경제'   },
      tech:       { title: '테크',        subtitle: '기술·AI 산업 핵심 이슈 실시간 뉴스',  tag: '테크'   },
      risk:       { title: '리스크 관리', subtitle: '주요 위험 요소 실시간 뉴스',          tag: '리스크' },
      archive:    { title: '뉴스 아카이브', subtitle: '날짜/시간별 저장된 뉴스 조회',      tag: '아카이브' },
      discussion: { title: '토론 게시판', subtitle: '뉴스에 대한 의견을 나눠보세요',       tag: '토론'   }
    };
    const RSS_FEEDS = {
      economy: 'https://rss.donga.com/economy.xml',
      tech:    'https://news.sbs.co.kr/news/SectionRssFeed.do?sectionId=07',
      risk:    'https://news.sbs.co.kr/news/SectionRssFeed.do?sectionId=03'
    };
    const CAT_LABELS = { economy: '경제', tech: '테크', risk: '리스크 관리' };
    const CAT_ICONS  = { economy: '📈',   tech: '💡',   risk: '🛡️' };

    let currentCategory = 'economy';
    let bookmarkedIds   = new Set();
    let liveCache       = {};
    let articleContext  = null;

    // ── 아카이브 트리 상태 ────────────────────────────────────────────
    let archiveTreeOpen = false;
    const archiveTreeCats = {
      economy: { label: '경제',     icon: '📈', isOpen: false, dateList: null, openDate: null },
      tech:    { label: '테크',     icon: '💡', isOpen: false, dateList: null, openDate: null },
      risk:    { label: '리스크 관리', icon: '🛡️', isOpen: false, dateList: null, openDate: null }
    };

    // ── HTML 유틸 ──────────────────────────────────────────────────────
    function decodeHtmlEntities(str) {
      const ta = document.createElement('textarea'); ta.innerHTML = str; return ta.value;
    }
    function parseDescription(raw) {
      if (!raw) return [];
      const stripped = raw.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
      const text = decodeHtmlEntities(stripped).replace(/^[▲△▶◆■●※\s]+/, '').replace(/\s+/g, ' ').trim();
      if (!text) return [];
      const sentences = text.split(/(?<=[.!?…])\s+/).map(s => s.trim()).filter(s => s.length > 8);
      if (sentences.length >= 2) return sentences.slice(0, 3);
      if (text.length > 40) {
        const words = text.split(' '), third = Math.ceil(words.length / 3);
        return [words.slice(0, third).join(' '), words.slice(third, third*2).join(' '), words.slice(third*2).join(' ')]
          .filter(s => s.length > 4).slice(0, 3);
      }
      return [text];
    }

    // ── RSS fetch ─────────────────────────────────────────────────────
    async function fetchNews(cat) {
      showSkeleton();
      try {
        const res  = await fetch(PROXY + encodeURIComponent(RSS_FEEDS[cat]));
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        const doc  = new DOMParser().parseFromString(text, 'text/xml');
        const items = [...doc.querySelectorAll('item')].slice(0, 5);
        if (!items.length) throw new Error('No items');
        const articles = items.map((item, idx) => {
          const get = tag => { const el = item.querySelector(tag); return el ? el.textContent.trim() : ''; };
          const url = get('link') || get('guid');
          return { id: `${cat}_${idx}`, title: get('title'), source: extractDomain(url || RSS_FEEDS[cat]),
                   time: relativeTime(get('pubDate')), url, tag: categoryMeta[cat].tag, summary: parseDescription(get('description')) };
        });
        liveCache[cat] = articles;
        updateTimestamp();
        updateTabCount(cat, articles.length);
        renderCards(articles);
        saveToArchive(articles, cat);
      } catch (err) { console.warn('[RSS]', err); showError(cat); }
    }

    async function saveToArchive(articles, cat) {
      const batchId = crypto.randomUUID();
      const { error } = await sb.from('news_archive').insert(
        articles.map(a => ({ batch_id: batchId, category: cat, title: a.title, source: a.source || '',
                             url: a.url || '', summary: a.summary || [], tag: a.tag || '' }))
      );
      if (error) console.warn('[Archive]', error.message);
    }

    // ── 카테고리 전환 ─────────────────────────────────────────────────
    function switchCategory(cat, ctx = null) {
      currentCategory = cat;

      // 다른 카테고리로 이동 시 아카이브 트리 닫기
      if (cat !== 'archive' && archiveTreeOpen) {
        archiveTreeOpen = false;
        const tc = document.getElementById('archive-tree-container');
        const cv = document.getElementById('archive-chevron');
        if (tc) tc.classList.add('hidden');
        if (cv) cv.classList.remove('open');
        document.querySelector('[data-cat="archive"]').className =
          'tab-inactive w-full text-left px-4 py-3 text-sm transition-all flex items-center gap-3';
      }

      document.querySelectorAll('#category-nav button[data-cat]').forEach(btn => {
        const active = btn.dataset.cat === cat;
        btn.className = `${active ? 'tab-active' : 'tab-inactive'} w-full text-left px-4 py-3 text-sm transition-all flex items-center gap-3`;
        // span 배지만 업데이트 (archive의 SVG 화살표 제외)
        const badge = btn.querySelector('span.ml-auto');
        if (badge) badge.className = `ml-auto text-xs ${active ? 'bg-brand-100 text-brand-500' : 'bg-gray-100 text-gray-400'} px-2 py-0.5 rounded-full`;
      });

      document.getElementById('cat-title').textContent    = categoryMeta[cat].title;
      document.getElementById('cat-subtitle').textContent = categoryMeta[cat].subtitle;
      document.getElementById('sort-control').style.display = (cat === 'discussion' || cat === 'archive') ? 'none' : 'flex';

      if (cat === 'discussion') {
        articleContext = ctx;
        fetchDiscussions();
      } else if (cat === 'archive') {
        showArchiveHint();
      } else if (liveCache[cat]) {
        renderCards(liveCache[cat]);
      } else {
        fetchNews(cat);
      }
    }

    // ── 아카이브 트리 토글 ────────────────────────────────────────────
    function toggleArchiveTree() {
      archiveTreeOpen = !archiveTreeOpen;
      const container = document.getElementById('archive-tree-container');
      const chevron   = document.getElementById('archive-chevron');
      const btn       = document.querySelector('[data-cat="archive"]');

      if (archiveTreeOpen) {
        container.classList.remove('hidden');
        chevron.classList.add('open');
        // 다른 탭 비활성화, archive 활성화
        document.querySelectorAll('#category-nav button[data-cat]').forEach(b => {
          const active = b.dataset.cat === 'archive';
          b.className = `${active ? 'tab-active' : 'tab-inactive'} w-full text-left px-4 py-3 text-sm transition-all flex items-center gap-3`;
          const badge = b.querySelector('span.ml-auto');
          if (badge) badge.className = `ml-auto text-xs ${active ? 'bg-brand-100 text-brand-500' : 'bg-gray-100 text-gray-400'} px-2 py-0.5 rounded-full`;
        });
        currentCategory = 'archive';
        document.getElementById('cat-title').textContent    = categoryMeta.archive.title;
        document.getElementById('cat-subtitle').textContent = categoryMeta.archive.subtitle;
        document.getElementById('sort-control').style.display = 'none';
        showArchiveHint();
        renderArchiveTree();
      } else {
        container.classList.add('hidden');
        chevron.classList.remove('open');
        // archive 탭 비활성화
        btn.className = 'tab-inactive w-full text-left px-4 py-3 text-sm transition-all flex items-center gap-3';
        // 모든 서브트리 닫기
        Object.values(archiveTreeCats).forEach(c => { c.isOpen = false; c.openDate = null; });
      }
    }

    // ── 아카이브 트리: 카테고리 토글 ─────────────────────────────────
    async function toggleArchiveTreeCat(cat) {
      const state = archiveTreeCats[cat];
      state.isOpen = !state.isOpen;

      if (state.isOpen && state.dateList === null) {
        state.dateList = 'loading';
        renderArchiveTree();

        const { data, error } = await sb.from('news_archive')
          .select('batch_id, saved_at')
          .eq('category', cat)
          .order('saved_at', { ascending: false })
          .limit(2000);

        if (error || !data) {
          state.dateList = [];
        } else {
          const batchMap = {};
          data.forEach(row => {
            if (!batchMap[row.batch_id]) batchMap[row.batch_id] = { batch_id: row.batch_id, saved_at: row.saved_at, count: 0 };
            batchMap[row.batch_id].count++;
          });
          const byDate = {};
          Object.values(batchMap).forEach(b => {
            const kst  = toKST(b.saved_at);
            const date = kst.slice(0, 10);
            if (!byDate[date]) byDate[date] = [];
            byDate[date].push({ ...b, kst });
          });
          state.dateList = Object.entries(byDate)
            .sort(([a], [b]) => b.localeCompare(a))
            .map(([date, batches]) => ({ date, batches: batches.sort((a, b) => b.saved_at.localeCompare(a.saved_at)) }));
        }
      }
      renderArchiveTree();
    }

    // ── 아카이브 트리: 날짜 토글 ──────────────────────────────────────
    function toggleArchiveTreeDate(cat, date) {
      const state = archiveTreeCats[cat];
      state.openDate = state.openDate === date ? null : date;
      renderArchiveTree();
    }

    // ── 아카이브 트리 렌더링 ──────────────────────────────────────────
    function renderArchiveTree() {
      const body = document.getElementById('archive-tree-body');
      if (!body) return;

      const catList = [
        { key: 'economy', label: '경제',        icon: '📈' },
        { key: 'tech',    label: '테크',        icon: '💡' },
        { key: 'risk',    label: '리스크 관리', icon: '🛡️' }
      ];

      body.innerHTML = catList.map(c => {
        const state    = archiveTreeCats[c.key];
        const catOpen  = state.isOpen;

        let childrenHtml = '';
        if (catOpen) {
          if (state.dateList === 'loading') {
            childrenHtml = `<div class="pl-8 py-2 text-xs text-gray-400 animate-pulse">불러오는 중…</div>`;
          } else if (!state.dateList || !state.dateList.length) {
            childrenHtml = `<div class="pl-8 py-2 text-xs text-gray-400">저장된 데이터 없음</div>`;
          } else {
            childrenHtml = state.dateList.map(({ date, batches }) => {
              const dateOpen = state.openDate === date;
              const batchRows = dateOpen
                ? batches.map(b => `
                  <div class="tree-row flex items-center gap-2 pl-12 pr-3 py-1.5 text-xs text-gray-500 hover:bg-blue-50 cursor-pointer"
                    onclick="loadBatchFromTree('${b.batch_id}','${c.key}','${escAttr(date)}')">
                    <span class="w-1.5 h-1.5 rounded-full bg-brand-300 flex-shrink-0"></span>
                    <span class="text-gray-500">${b.kst.slice(11, 16)}</span>
                    <span class="ml-auto text-brand-500" style="font-weight:600">${b.count}건</span>
                  </div>`).join('')
                : '';

              return `
                <div>
                  <div class="tree-row flex items-center gap-1.5 pl-7 pr-3 py-1.5 text-xs text-gray-600 hover:bg-gray-100 cursor-pointer select-none"
                    onclick="toggleArchiveTreeDate('${c.key}','${escAttr(date)}')">
                    <svg class="tree-chevron w-3 h-3 text-gray-400 flex-shrink-0 ${dateOpen ? 'open' : ''}"
                      fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                    </svg>
                    <span class="truncate flex-1">📅 ${escHtml(date)}</span>
                    <span class="text-gray-400 flex-shrink-0">${batches.length}</span>
                  </div>
                  ${batchRows}
                </div>`;
            }).join('');
          }
        }

        return `
          <div>
            <div class="tree-row flex items-center gap-2 pl-4 pr-3 py-2 text-xs text-gray-700 hover:bg-gray-100 cursor-pointer select-none"
              onclick="toggleArchiveTreeCat('${c.key}')">
              <svg class="tree-chevron w-3.5 h-3.5 text-gray-400 flex-shrink-0 ${catOpen ? 'open' : ''}"
                fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
              </svg>
              <span class="text-sm">${c.icon}</span>
              <span style="font-weight:500">${c.label}</span>
            </div>
            ${catOpen ? `<div>${childrenHtml}</div>` : ''}
          </div>`;
      }).join('');
    }

    // ── 트리에서 배치 불러오기 ────────────────────────────────────────
    async function loadBatchFromTree(batchId, cat, date) {
      currentCategory = 'archive';
      document.getElementById('cat-title').textContent    = categoryMeta.archive.title;
      document.getElementById('cat-subtitle').textContent = categoryMeta.archive.subtitle;
      document.getElementById('sort-control').style.display = 'none';
      await loadBatch(batchId, date);
    }

    // ── 아카이브 힌트 화면 ────────────────────────────────────────────
    function showArchiveHint() {
      document.getElementById('news-container').innerHTML = `
        <div class="bg-white rounded-xl border border-gray-200 p-16 text-center"
          style="animation:fadeIn .2s ease both">
          <div class="text-5xl mb-4">📁</div>
          <p class="text-gray-700 text-sm mb-1" style="font-weight:600">왼쪽 트리에서 카테고리와 날짜를 선택하세요</p>
          <p class="text-gray-400 text-xs">카테고리 → 날짜 → 수집 시간 순으로 펼쳐서 선택할 수 있습니다</p>
        </div>`;
    }

    // ── 배치 기사 불러오기 ────────────────────────────────────────────
    async function loadBatch(batchId, date) {
      const container = document.getElementById('news-container');
      container.innerHTML = archiveBackBtn() + skeletonList(3, true);
      const { data, error } = await sb.from('news_archive').select('*').eq('batch_id', batchId).order('id');
      if (error || !data?.length) {
        container.innerHTML = archiveBackBtn() + errorBox('기사를 불러오지 못했습니다.');
        return;
      }
      const kst   = toKST(data[0].saved_at);
      const label = CAT_LABELS[data[0].category] || data[0].category;
      const icon  = CAT_ICONS[data[0].category]  || '📰';
      container.innerHTML = `
        <div class="flex items-center gap-2 mb-2 flex-wrap">
          ${archiveBackBtn()}
          <span class="text-gray-300 text-xs">|</span>
          <span class="text-xs text-gray-500">${icon} ${escHtml(label)} · ${escHtml(kst.slice(0,16).replace('T',' '))}</span>
        </div>
        <div class="flex flex-col gap-4">
          ${data.map((item, idx) => archiveCard(item, idx)).join('')}
        </div>`;
    }

    function archiveBackBtn() {
      return `<button onclick="showArchiveHint()"
        class="inline-flex items-center gap-1 text-xs text-brand-500 hover:underline">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>아카이브 목록으로
      </button>`;
    }

      const summary = Array.isArray(item.summary) ? item.summary : [];
      const lines   = summary.length ? summary : ['요약 정보 없음'];
      return `
        <article class="bg-white rounded-xl border border-gray-200 p-6 card-hover"
          style="animation:fadeIn .2s ease both;animation-delay:${idx * .06}s">
          <div class="flex items-center gap-2 mb-2 flex-wrap">
            <span class="text-xs text-brand-500 bg-brand-50 px-2 py-0.5 rounded-md" style="font-weight:600">${escHtml(item.tag || '')}</span>
            <span class="text-xs text-gray-400">${escHtml(item.source || '')}</span>
          </div>
          <h3 class="text-base text-gray-900 leading-snug mb-4" style="font-weight:700">${escHtml(item.title)}</h3>
          <div class="bg-gray-50 rounded-lg px-4 py-3 mb-4 border border-gray-100">
            <p class="text-xs text-gray-400 mb-2 flex items-center gap-1" style="font-weight:600">
              <svg class="w-3.5 h-3.5 text-brand-500" fill="currentColor" viewBox="0 0 20 20">
                <path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/>
                <path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/>
              </svg>뉴스 요약
            </p>
            <ul class="space-y-1.5">${lines.map(l => `
              <li class="flex items-start gap-2 text-sm text-gray-700 leading-relaxed">
                <span class="mt-1.5 w-2 h-2 rounded-full bg-brand-500 flex-shrink-0"></span>
                <span>${escHtml(l)}</span>
              </li>`).join('')}</ul>
          </div>
          <div class="flex items-center gap-2 flex-wrap">
            ${item.url ? `
            <a href="${escAttr(item.url)}" target="_blank" rel="noopener noreferrer"
              class="inline-flex items-center gap-1.5 text-xs text-white bg-brand-500 hover:bg-brand-600 px-4 py-2 rounded-lg transition" style="font-weight:600">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
              </svg>원본 기사 보기
            </a>` : ''}
            <button onclick='openDiscussion(${JSON.stringify(item.title)},${JSON.stringify(item.url || "")})'
              class="inline-flex items-center gap-1.5 text-xs text-brand-500 border border-brand-500 hover:bg-brand-50 px-4 py-2 rounded-lg transition" style="font-weight:600">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
              </svg>이 기사 토론하기
            </button>
          </div>
        </article>`;
    }

    function openDiscussion(title, url) {
      switchCategory('discussion', { title, url });
    }

    // ── 토론 게시판 ───────────────────────────────────────────────────
    async function fetchDiscussions() {
      const container = document.getElementById('news-container');
      container.innerHTML = discussionFormHtml() + `<div id="disc-list" class="flex flex-col gap-3">${skeletonList(3)}</div>`;
      const textarea = document.getElementById('disc-content');
      if (textarea) textarea.addEventListener('input', () => {
        const c = document.getElementById('disc-char-count'); if (c) c.textContent = `${textarea.value.length} / 500`;
      });

      let query = sb.from('discussions').select('*').order('created_at', { ascending: false }).limit(50);
      if (articleContext) query = query.eq('news_title', articleContext.title);
      const { data, error } = await query;
      if (error) { document.getElementById('disc-list').innerHTML = errorBox(error.message); return; }
      updateTabCount('discussion', data.length);
      renderDiscussions(data);
    }

    function discussionFormHtml() {
      const articleBanner = articleContext ? `
        <div class="flex items-start gap-3 bg-brand-50 border border-brand-100 rounded-lg px-4 py-3 mb-4">
          <svg class="w-4 h-4 text-brand-500 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/>
          </svg>
          <div class="flex-1 min-w-0">
            <p class="text-xs text-brand-500 mb-0.5" style="font-weight:600">연결된 기사</p>
            <p class="text-sm text-gray-700 leading-snug" style="font-weight:500">${escHtml(articleContext.title)}</p>
          </div>
          <button onclick="clearArticleContext()" class="text-gray-400 hover:text-gray-600 flex-shrink-0" title="연결 해제">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>` : '';
      const tabBtns = articleContext ? `
        <div class="flex gap-2 mb-4">
          <button onclick="filterDiscussion('article')" id="tab-article"
            class="disc-tab-active text-xs px-3 py-1.5 rounded-lg border transition">이 기사 토론</button>
          <button onclick="filterDiscussion('all')" id="tab-all"
            class="disc-tab-inactive text-xs px-3 py-1.5 rounded-lg border transition">전체 토론 보기</button>
        </div>` : '';
      return `
        <div class="bg-white rounded-xl border border-gray-200 p-6 mb-4">
          ${articleBanner}${tabBtns}
          <h3 class="text-sm text-gray-700 mb-4 flex items-center gap-2" style="font-weight:600">
            <svg class="w-4 h-4 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
            </svg>새 글 작성
          </h3>
          <div class="flex flex-col gap-3">
            <input id="disc-nickname" type="text" maxlength="20" placeholder="닉네임 (최대 20자)"
              class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500 placeholder-gray-300"/>
            <textarea id="disc-content" maxlength="500" rows="3" placeholder="의견을 입력하세요 (최대 500자)"
              class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500 placeholder-gray-300 resize-none"></textarea>
            <div class="flex justify-between items-center">
              <span id="disc-char-count" class="text-xs text-gray-300">0 / 500</span>
              <button onclick="submitDiscussion()"
                class="text-xs text-white bg-brand-500 hover:bg-brand-600 px-5 py-2 rounded-lg transition" style="font-weight:600">게시하기</button>
            </div>
          </div>
        </div>`;
    }

    function clearArticleContext() { articleContext = null; fetchDiscussions(); }

    function filterDiscussion(mode) {
      document.getElementById('tab-article')?.classList.replace(
        mode === 'article' ? 'disc-tab-inactive' : 'disc-tab-active',
        mode === 'article' ? 'disc-tab-active'   : 'disc-tab-inactive');
      document.getElementById('tab-all')?.classList.replace(
        mode === 'all' ? 'disc-tab-inactive' : 'disc-tab-active',
        mode === 'all' ? 'disc-tab-active'   : 'disc-tab-inactive');
      const list = document.getElementById('disc-list'); if (!list) return;
      list.innerHTML = skeletonList(3);
      let query = sb.from('discussions').select('*').order('created_at', { ascending: false }).limit(50);
      if (mode === 'article' && articleContext) query = query.eq('news_title', articleContext.title);
      query.then(({ data, error }) => {
        if (error) { list.innerHTML = errorBox(error.message); return; }
        updateTabCount('discussion', data.length);
        renderDiscussions(data);
      });
    }

    function renderDiscussions(posts) {
      const list = document.getElementById('disc-list'); if (!list) return;
      if (!posts?.length) {
        list.innerHTML = `<div class="bg-white rounded-xl border border-gray-200 p-16 text-center">
          <div class="text-4xl mb-3">💬</div>
          <p class="text-gray-400 text-sm">${articleContext ? '이 기사에 대한 토론이 없습니다.<br>첫 번째 의견을 남겨보세요!' : '첫 번째 게시글을 작성해보세요!'}</p>
        </div>`;
        return;
      }
      const colors = ['#3b5bdb','#0ca678','#f76707','#e03131','#7048e8','#1098ad','#d6336c'];
      list.innerHTML = posts.map((p, i) => {
        const liked = likedPosts.has(p.id);
        const color = colors[p.nickname.charCodeAt(0) % colors.length];
        const articleTag = p.news_title ? `
          <div class="mb-2 flex items-center gap-1.5">
            <svg class="w-3 h-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
            </svg>
            <span class="text-xs text-gray-400 truncate max-w-xs">${escHtml(p.news_title)}</span>
          </div>` : '';
        return `
          <article data-disc-id="${p.id}" class="bg-white rounded-xl border border-gray-200 p-5 card-hover"
            style="animation:fadeIn .25s ease both;animation-delay:${i * .05}s">
            ${articleTag}
            <div class="flex items-center gap-3 mb-3">
              <div class="w-9 h-9 rounded-full flex items-center justify-center text-white text-sm flex-shrink-0"
                style="background:${color};font-weight:700">${escHtml(p.nickname[0].toUpperCase())}</div>
              <div>
                <span class="text-sm text-gray-800" style="font-weight:600">${escHtml(p.nickname)}</span>
                <span class="text-xs text-gray-400 ml-2">${relativeTime(p.created_at)}</span>
              </div>
              <button onclick="toggleDiscLike('${p.id}',this)" data-likes="${p.likes || 0}"
                class="ml-auto flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-lg border transition
                  ${liked ? 'border-brand-500 text-brand-500 bg-brand-50' : 'border-gray-200 text-gray-400 hover:border-brand-500 hover:text-brand-500'}">
                <svg class="w-3.5 h-3.5" fill="${liked ? 'currentColor' : 'none'}" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
                </svg>
                <span class="like-count">${p.likes || 0}</span>
              </button>
            </div>
            <p class="text-sm text-gray-700 leading-relaxed whitespace-pre-wrap"
              id="disc-content-${p.id}" data-original="${escHtml(p.content)}">${escHtml(p.content)}</p>
            <div class="flex items-center gap-3 mt-3 pt-3 border-t border-gray-50">
              <button onclick="editDiscussion('${p.id}')"
                class="text-xs text-gray-400 hover:text-brand-500 transition flex items-center gap-1">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                </svg>수정
              </button>
              <button onclick="deleteDiscussion('${p.id}')"
                class="text-xs text-gray-400 hover:text-red-500 transition flex items-center gap-1">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>삭제
              </button>
            </div>
          </article>`;
      }).join('');
    }

    async function submitDiscussion() {
      const nickname = (document.getElementById('disc-nickname')?.value || '').trim();
      const content  = (document.getElementById('disc-content')?.value  || '').trim();
      if (!nickname) { alert('닉네임을 입력해주세요.'); return; }
      if (!content)  { alert('내용을 입력해주세요.'); return; }
      const btn = document.querySelector('[onclick="submitDiscussion()"]');
      if (btn) { btn.disabled = true; btn.textContent = '게시 중...'; }
      const payload = { nickname, content, likes: 0 };
      if (articleContext) { payload.news_title = articleContext.title; payload.news_url = articleContext.url || ''; }
      const { error } = await sb.from('discussions').insert(payload);
      if (error) { alert('게시 실패: ' + error.message); if (btn) { btn.disabled = false; btn.textContent = '게시하기'; } }
      else await fetchDiscussions();
    }

    async function toggleDiscLike(id, btn) {
      if (likedPosts.has(id)) return;
      likedPosts.add(id); localStorage.setItem('likedPosts', JSON.stringify([...likedPosts]));
      const countEl = btn.querySelector('.like-count'), newCount = parseInt(btn.dataset.likes || '0') + 1;
      if (countEl) countEl.textContent = newCount; btn.dataset.likes = newCount;
      btn.classList.remove('border-gray-200','text-gray-400');
      btn.classList.add('border-brand-500','text-brand-500','bg-brand-50');
      btn.querySelector('svg').setAttribute('fill','currentColor');
      await sb.from('discussions').update({ likes: newCount }).eq('id', id);
    }

    // ── 토론 수정 ─────────────────────────────────────────────────────
    function editDiscussion(id) {
      const contentEl = document.getElementById(`disc-content-${id}`);
      if (!contentEl) return;
      const original = contentEl.dataset.original || contentEl.textContent;
      contentEl.outerHTML = `
        <div id="disc-edit-${id}" class="mt-1" data-original="${escHtml(original)}">
          <textarea id="disc-edit-ta-${id}" maxlength="500" rows="3"
            class="w-full text-sm border border-brand-400 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500 resize-none"
          >${escHtml(original)}</textarea>
          <div class="flex items-center gap-2 mt-2">
            <button onclick="saveDiscussionEdit('${id}')"
              class="text-xs text-white bg-brand-500 hover:bg-brand-600 px-4 py-1.5 rounded-lg transition" style="font-weight:600">저장</button>
            <button onclick="cancelDiscussionEdit('${id}')"
              class="text-xs text-gray-500 hover:text-gray-700 border border-gray-200 px-4 py-1.5 rounded-lg transition">취소</button>
          </div>
        </div>`;
    }

    async function saveDiscussionEdit(id) {
      const ta = document.getElementById(`disc-edit-ta-${id}`);
      if (!ta) return;
      const newContent = ta.value.trim();
      if (!newContent) { alert('내용을 입력해주세요.'); return; }
      const { error } = await sb.from('discussions').update({ content: newContent }).eq('id', id);
      if (error) { alert('수정 실패: ' + error.message); return; }
      const editEl = document.getElementById(`disc-edit-${id}`);
      if (editEl) editEl.outerHTML = `
        <p class="text-sm text-gray-700 leading-relaxed whitespace-pre-wrap mt-1"
          id="disc-content-${id}" data-original="${escHtml(newContent)}">${escHtml(newContent)}</p>`;
    }

    function cancelDiscussionEdit(id) {
      const editEl = document.getElementById(`disc-edit-${id}`);
      if (!editEl) return;
      const text = editEl.dataset.original || '';
      editEl.outerHTML = `
        <p class="text-sm text-gray-700 leading-relaxed whitespace-pre-wrap mt-1"
          id="disc-content-${id}" data-original="${escHtml(text)}">${escHtml(text)}</p>`;
    }

    async function deleteDiscussion(id) {
      if (!confirm('이 게시글을 삭제하시겠습니까?')) return;
      const { error } = await sb.from('discussions').delete().eq('id', id);
      if (error) { alert('삭제 실패: ' + error.message); return; }
      const article = document.querySelector(`article[data-disc-id="${id}"]`);
      article?.remove();
      const list = document.getElementById('disc-list');
      if (list && !list.querySelector('article')) {
        list.innerHTML = `
          <div class="bg-white rounded-xl border border-gray-200 p-16 text-center">
            <div class="text-4xl mb-3">💬</div>
            <p class="text-gray-400 text-sm">게시글이 없습니다.</p>
          </div>`;
      }
    }

    // ── 북마크 ────────────────────────────────────────────────────────
    function showBookmarks() {
      const saved = Object.values(liveCache).flat().filter(n => bookmarkedIds.has(n.id));
      document.getElementById('cat-title').textContent    = '북마크';
      document.getElementById('cat-subtitle').textContent = '저장한 뉴스 모아보기';
      document.querySelectorAll('#category-nav button[data-cat]').forEach(btn => {
        btn.className = 'tab-inactive w-full text-left px-4 py-3 text-sm transition-all flex items-center gap-3';
        const badge = btn.querySelector('span.ml-auto');
        if (badge) badge.className = 'ml-auto text-xs bg-gray-100 text-gray-400 px-2 py-0.5 rounded-full';
      });
      // 아카이브 트리 닫기
      if (archiveTreeOpen) {
        archiveTreeOpen = false;
        document.getElementById('archive-tree-container')?.classList.add('hidden');
        document.getElementById('archive-chevron')?.classList.remove('open');
      }
      currentCategory = null;
      document.getElementById('sort-control').style.display = 'flex';
      renderCards(saved, true);
    }

    function toggleBookmark(id, btn) {
      if (bookmarkedIds.has(id)) {
        bookmarkedIds.delete(id);
        btn.classList.replace('bookmark-active', 'bookmark-inactive');
        btn.querySelector('svg').setAttribute('fill', 'none');
        btn.querySelector('.bm-label').textContent = '북마크';
        btn.title = '북마크 추가';
      } else {
        bookmarkedIds.add(id);
        btn.classList.replace('bookmark-inactive', 'bookmark-active');
        btn.querySelector('svg').setAttribute('fill', 'currentColor');
        btn.querySelector('.bm-label').textContent = '북마크됨';
        btn.title = '북마크 제거';
      }
    }

    // ── 카드 렌더링 ───────────────────────────────────────────────────
    function renderCards(articles, isBookmark = false) {
      const container = document.getElementById('news-container');
      if (!articles?.length) {
        container.innerHTML = `
          <div class="bg-white rounded-xl border border-gray-200 p-16 text-center">
            <div class="text-4xl mb-3">🔖</div>
            <p class="text-gray-400 text-sm">${isBookmark ? '저장된 북마크가 없습니다.' : '뉴스가 없습니다.'}</p>
          </div>`;
        return;
      }
      container.innerHTML = articles.map((news, idx) => {
        const bookmarked = bookmarkedIds.has(news.id);
        const lines = news.summary?.length ? news.summary : ['요약 정보를 불러올 수 없습니다.'];
        return `
          <article data-id="${news.id}" class="bg-white rounded-xl border border-gray-200 p-6 card-hover"
            style="animation:fadeIn .25s ease both;animation-delay:${idx * .06}s">
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 mb-2 flex-wrap">
                <span class="text-xs text-brand-500 bg-brand-50 px-2 py-0.5 rounded-md" style="font-weight:600">${escHtml(news.tag)}</span>
                <span class="text-xs text-gray-400">${escHtml(news.source)}</span>
                <span class="text-gray-200 text-xs">|</span>
                <span class="text-xs text-gray-400">${escHtml(news.time)}</span>
              </div>
              <h3 class="text-base text-gray-900 leading-snug mb-4" style="font-weight:700">${escHtml(news.title)}</h3>
              <div class="bg-gray-50 rounded-lg px-4 py-3 mb-4 border border-gray-100">
                <p class="text-xs text-gray-400 mb-2 flex items-center gap-1" style="font-weight:600">
                  <svg class="w-3.5 h-3.5 text-brand-500" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/>
                    <path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/>
                  </svg>뉴스 요약
                </p>
                <ul class="space-y-1.5">${lines.map(l => `
                  <li class="flex items-start gap-2 text-sm text-gray-700 leading-relaxed">
                    <span class="mt-1.5 w-2 h-2 rounded-full bg-brand-500 flex-shrink-0"></span>
                    <span>${escHtml(l)}</span>
                  </li>`).join('')}</ul>
              </div>
              <div class="flex items-center gap-3">
                <a href="${escAttr(news.url)}" target="_blank" rel="noopener noreferrer"
                  class="inline-flex items-center gap-1.5 text-xs text-white bg-brand-500 hover:bg-brand-600 px-4 py-2 rounded-lg transition" style="font-weight:600">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
                  </svg>원본 기사 보기
                </a>
                <button onclick="toggleBookmark('${news.id}',this)"
                  title="${bookmarked ? '북마크 제거' : '북마크 추가'}"
                  class="${bookmarked ? 'bookmark-active' : 'bookmark-inactive'} inline-flex items-center gap-1.5 text-xs px-3 py-2 rounded-lg border border-gray-200 hover:border-brand-500 transition">
                  <svg class="w-4 h-4" fill="${bookmarked ? 'currentColor' : 'none'}" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/>
                  </svg>
                  <span class="bm-label">${bookmarked ? '북마크됨' : '북마크'}</span>
                </button>
              </div>
            </div>
          </article>`;
      }).join('');
    }

    // ── 스켈레톤 / 에러 ──────────────────────────────────────────────
    function showSkeleton() {
      document.getElementById('news-container').innerHTML = skeletonList(5, true);
    }
    function skeletonList(n = 3, isNews = false) {
      if (isNews) return Array(n).fill(0).map(() => `
        <div class="bg-white rounded-xl border border-gray-200 p-6 animate-pulse">
          <div class="flex gap-2 mb-3"><div class="h-5 w-14 bg-gray-200 rounded-md"></div><div class="h-5 w-24 bg-gray-100 rounded-md"></div></div>
          <div class="h-5 w-full bg-gray-200 rounded mb-2"></div><div class="h-5 w-4/5 bg-gray-200 rounded mb-4"></div>
          <div class="bg-gray-50 rounded-lg p-3 mb-4 border border-gray-100 space-y-2">
            <div class="h-3 w-20 bg-gray-200 rounded mb-3"></div>
            <div class="h-4 w-full bg-gray-100 rounded"></div><div class="h-4 w-full bg-gray-100 rounded"></div><div class="h-4 w-3/4 bg-gray-100 rounded"></div>
          </div>
          <div class="flex gap-3"><div class="h-8 w-28 bg-gray-200 rounded-lg"></div><div class="h-8 w-20 bg-gray-100 rounded-lg"></div></div>
        </div>`).join('');
      return Array(n).fill(0).map(() => `
        <div class="bg-white rounded-xl border border-gray-200 p-5 animate-pulse">
          <div class="flex items-center gap-3"><div class="w-4 h-4 bg-gray-200 rounded"></div><div class="h-4 w-32 bg-gray-200 rounded"></div><div class="h-3 w-20 bg-gray-100 rounded ml-2"></div></div>
        </div>`).join('');
    }

    function showError(cat) {
      document.getElementById('news-container').innerHTML = `
        <div class="bg-white rounded-xl border border-gray-200 p-16 text-center">
          <div class="text-4xl mb-3">⚠️</div>
          <p class="text-gray-700 text-sm font-medium mb-1">뉴스를 불러오지 못했습니다</p>
          <p class="text-gray-400 text-xs mb-5">RSS 서버 연결 실패. 잠시 후 다시 시도해주세요.</p>
          <button onclick="fetchNews('${escAttr(cat)}')"
            class="text-xs text-white bg-brand-500 hover:bg-brand-600 px-4 py-2 rounded-lg transition">다시 시도</button>
        </div>`;
    }
    function errorBox(msg) {
      return `<div class="bg-white rounded-xl border border-gray-200 p-10 text-center text-sm text-gray-400">${escHtml(msg)}</div>`;
    }

    // ── 유틸 ──────────────────────────────────────────────────────────
    function toKST(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      return new Date(d.getTime() + 9 * 3600000).toISOString().replace('Z', '');
    }
    function extractDomain(url) { try { return new URL(url).hostname.replace(/^www\./, ''); } catch { return '뉴스'; } }
    function relativeTime(pubDate) {
      if (!pubDate) return '';
      const diff = Date.now() - new Date(pubDate).getTime();
      const m = Math.floor(diff / 60000), h = Math.floor(diff / 3600000), d = Math.floor(diff / 86400000);
      if (m < 1)  return '방금 전';
      if (m < 60) return `${m}분 전`;
      if (h < 24) return `${h}시간 전`;
      return `${d}일 전`;
    }
    function updateTimestamp() {
      const now = new Date(), p = n => String(n).padStart(2,'0');
      document.getElementById('last-updated').textContent =
        `Last updated: ${now.getFullYear()}.${p(now.getMonth()+1)}.${p(now.getDate())} ${p(now.getHours())}:${p(now.getMinutes())}`;
    }
    function updateTabCount(cat, count) {
      const el = document.querySelector(`[data-cat="${cat}"] .tab-count`);
      if (el) el.textContent = count;
    }
    function escHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function escAttr(str) {
      if (!str) return '#';
      const s = String(str).trim();
      return /^https?:\/\//i.test(s) ? s.replace(/"/g,'%22') : '#';
    }

    fetchNews('economy');
  </script>
</body>
</html>
