<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 뉴스 요약 대시보드</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#eef2ff', 100:'#e0e7ff', 300:'#a5b4fc', 500:'#6366f1', 600:'#4f46e5', 700:'#4338ca' }
          },
          fontFamily: { sans: ['"Noto Sans KR"','ui-sans-serif','system-ui','sans-serif'] }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Base ── */
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Noto Sans KR', sans-serif; background: #f0f4ff; color: #1e1b4b; }

    /* ── Background ── */
    .page-bg {
      position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
      background: linear-gradient(145deg, #f0f4ff 0%, #faf5ff 50%, #eff6ff 100%);
    }
    .page-bg .dot-grid {
      position: absolute; inset: 0;
      background-image: radial-gradient(rgba(99,102,241,0.12) 1px, transparent 1px);
      background-size: 28px 28px;
    }
    .page-bg .orb {
      position: absolute; border-radius: 50%; filter: blur(100px);
    }
    .orb-1 { width: 700px; height: 700px; background: #c7d2fe; opacity: 0.7;
              top: -200px; left: -150px; animation: orbFloat1 14s ease-in-out infinite; }
    .orb-2 { width: 500px; height: 500px; background: #bae6fd; opacity: 0.6;
              bottom: -120px; right: -100px; animation: orbFloat2 17s ease-in-out infinite; }
    .orb-3 { width: 400px; height: 400px; background: #ddd6fe; opacity: 0.55;
              top: 45%; left: 42%; transform: translate(-50%,-50%); animation: orbFloat3 20s ease-in-out infinite; }
    @keyframes orbFloat1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(50px,-35px)} }
    @keyframes orbFloat2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-40px,50px)} }
    @keyframes orbFloat3 { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-50%) scale(1.12)} }

    /* All page content above background */
    body > *:not(.page-bg) { position: relative; z-index: 1; }

    /* ── Glass Surfaces ── */
    .glass {
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(18px) saturate(1.8);
      -webkit-backdrop-filter: blur(18px) saturate(1.8);
      border: 1px solid rgba(99,102,241,0.14);
    }
    .glass-card {
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(14px) saturate(1.6);
      -webkit-backdrop-filter: blur(14px) saturate(1.6);
      border: 1px solid rgba(99,102,241,0.13);
      border-radius: 0.875rem;
      transition: box-shadow 0.25s ease, transform 0.25s ease, border-color 0.25s ease;
    }
    .glass-card:hover {
      box-shadow: 0 8px 32px rgba(99,102,241,0.14), 0 0 0 1px rgba(99,102,241,0.2);
      transform: translateY(-2px);
      border-color: rgba(99,102,241,0.25);
    }
    .glass-inner {
      background: rgba(99,102,241,0.05);
      border: 1px solid rgba(99,102,241,0.1);
      border-radius: 0.5rem;
    }

    /* ── Navigation Tabs ── */
    .tab-active {
      border-left: 3px solid #6366f1;
      background: rgba(99,102,241,0.08);
      color: #4338ca;
      font-weight: 600;
    }
    .tab-inactive { border-left: 3px solid transparent; color: #9ca3af; }
    .tab-inactive:hover { background: rgba(99,102,241,0.05); color: #6366f1; }

    /* ── Bookmark ── */
    .bookmark-active   { color: #6366f1; }
    .bookmark-inactive { color: #c7d2fe; }

    /* ── Discussion Tabs ── */
    .disc-tab-active   { background: rgba(99,102,241,0.1); color: #4338ca; border-color: #6366f1; font-weight: 600; }
    .disc-tab-inactive { background: white; color: #9ca3af; border-color: #e5e7eb; }
    .disc-tab-inactive:hover { background: #f5f3ff; }

    /* ── Archive Tree ── */
    .tree-chevron { transition: transform 0.18s ease; }
    .tree-chevron.open { transform: rotate(90deg); }
    .tree-row { transition: background-color 0.12s; }
    .tree-row:hover { background: rgba(99,102,241,0.06); }

    /* ── Animations ── */
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position:  400px 0; }
    }
    .skeleton-line {
      background: linear-gradient(90deg, #e0e7ff 25%, #c7d2fe 50%, #e0e7ff 75%);
      background-size: 800px 100%;
      animation: shimmer 1.6s infinite;
      border-radius: 0.375rem;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.25); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(99,102,241,0.45); }

    /* ── Form inputs ── */
    .dark-input {
      background: rgba(255,255,255,0.8);
      border: 1px solid rgba(99,102,241,0.2);
      color: #1e1b4b;
      border-radius: 0.5rem;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      width: 100%;
      font-size: 0.875rem;
      padding: 0.5rem 0.75rem;
    }
    .dark-input::placeholder { color: #c4b5fd; }
    .dark-input:focus {
      border-color: rgba(99,102,241,0.5);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
    }
    textarea.dark-input { resize: none; }

    /* ── Buttons ── */
    .btn-primary {
      display: inline-flex; align-items: center; gap: 0.375rem;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #fff; font-size: 0.75rem; font-weight: 600;
      padding: 0.5rem 1rem; border-radius: 0.5rem;
      transition: opacity 0.15s, transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 14px rgba(99,102,241,0.28);
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(99,102,241,0.38); }
    .btn-ghost {
      display: inline-flex; align-items: center; gap: 0.375rem;
      color: #6366f1; font-size: 0.75rem; font-weight: 600;
      padding: 0.5rem 1rem; border-radius: 0.5rem;
      border: 1px solid rgba(99,102,241,0.3);
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-ghost:hover { background: rgba(99,102,241,0.07); border-color: rgba(99,102,241,0.5); }
    .btn-sm {
      display: inline-flex; align-items: center; gap: 0.25rem;
      font-size: 0.7rem; padding: 0.375rem 0.75rem; border-radius: 0.4rem;
    }

    /* ── Badge ── */
    .badge { font-size: 0.7rem; font-weight: 600; padding: 0.15rem 0.5rem; border-radius: 9999px; }
    .badge-brand { background: #ede9fe; color: #4338ca; border: 1px solid #c4b5fd; }
    .badge-gray  { background: #f3f4f6; color: #9ca3af; border: 1px solid #e5e7eb; }

    /* ── Category header gradient text ── */
    .gradient-text {
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 50%, #7c3aed 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Divider ── */
    .divider { border-color: rgba(99,102,241,0.1); }
  </style>
</head>
<body class="min-h-screen">

  <!-- ── Background ─────────────────────────────────────────────────── -->
  <div class="page-bg" aria-hidden="true">
    <div class="dot-grid"></div>

  <!-- ── Header ─────────────────────────────────────────────────────── -->
  <header style="background:rgba(255,255,255,0.85);backdrop-filter:blur(20px) saturate(1.8);-webkit-backdrop-filter:blur(20px) saturate(1.8);border-bottom:1px solid rgba(99,102,241,0.12);" class="sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0"
          style="background:linear-gradient(135deg,#6366f1,#8b5cf6);box-shadow:0 4px 16px rgba(99,102,241,0.35)">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
          </svg>

  <div class="max-w-7xl mx-auto px-6 py-6 flex gap-5">

    <!-- ── Left Sidebar ─────────────────────────────────────────────── -->
    <aside class="w-52 flex-shrink-0">
      <div class="glass rounded-2xl overflow-hidden sticky top-24">
        <div class="px-4 py-3" style="border-bottom:1px solid rgba(99,102,241,0.1)">
          <p class="text-xs uppercase tracking-widest" style="color:#6366f1;font-weight:700;letter-spacing:.1em">카테고리</p>
        </div>
        <nav id="category-nav" class="py-1.5">
          <button onclick="switchCategory('economy')" data-cat="economy"

          </div>

          <button onclick="switchCategory('discussion')" data-cat="discussion"

            </svg>
            북마크 모아보기

    <!-- ── Main Content ──────────────────────────────────────────────── -->
    <main class="flex-1 min-w-0">

          <h2 id="cat-title" class="text-xl gradient-text" style="font-weight:700">경제</h2>
          <p id="cat-subtitle" class="text-xs mt-0.5" style="color:#6366f1">글로벌 경제 동향 실시간 뉴스</p>

  <script>
    const SUPABASE_URL = 'https://zpamwbrbvprlulzxrbkr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpwYW13YnJidnBybHVsenhyYmtyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MjUzNjYsImV4cCI6MjA5NTQwMTM2Nn0.HULOQVq_SziDWSQb8wXj17EItQwSxkl6jkR4RXAsCTw';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let likedPosts = new Set(JSON.parse(localStorage.getItem('likedPosts') || '[]'));

    const PROXY = 'https://api.allorigins.win/raw?url=';
    const categoryMeta = {
      economy:    { title: '경제',          subtitle: '글로벌 경제 동향 실시간 뉴스',       tag: '경제'    },
      tech:       { title: '테크',          subtitle: '기술·AI 산업 핵심 이슈 실시간 뉴스',  tag: '테크'    },
      risk:       { title: '리스크 관리',   subtitle: '주요 위험 요소 실시간 뉴스',          tag: '리스크'  },
      archive:    { title: '뉴스 아카이브', subtitle: '날짜/시간별 저장된 뉴스 조회',        tag: '아카이브' },
      discussion: { title: '토론 게시판',   subtitle: '뉴스에 대한 의견을 나눠보세요',       tag: '토론'    }
    };
    const RSS_FEEDS = {
      economy: 'https://rss.donga.com/economy.xml',
      tech:    'https://news.sbs.co.kr/news/SectionRssFeed.do?sectionId=07',
      risk:    'https://news.sbs.co.kr/news/SectionRssFeed.do?sectionId=03'
    };
    const CAT_LABELS = { economy:'경제', tech:'테크', risk:'리스크 관리' };
    const CAT_ICONS  = { economy:'📈',  tech:'💡',  risk:'🛡️' };

    let currentCategory = 'economy';
    let bookmarkedIds   = new Set();
    let liveCache       = {};
    let articleContext  = null;

    // ── 아카이브 트리 상태 ────────────────────────────────────────────
    let archiveTreeOpen = false;
    const archiveTreeCats = {
      economy: { label:'경제',        icon:'📈', isOpen:false, dateList:null, openDate:null },
      tech:    { label:'테크',        icon:'💡', isOpen:false, dateList:null, openDate:null },
      risk:    { label:'리스크 관리', icon:'🛡️', isOpen:false, dateList:null, openDate:null }
    };

    // ── 유틸 ──────────────────────────────────────────────────────────
    function decodeHtmlEntities(str) {
      const ta = document.createElement('textarea'); ta.innerHTML = str; return ta.value;
    }
    function parseDescription(raw) {
      if (!raw) return [];
      const stripped = raw.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
      const text = decodeHtmlEntities(stripped).replace(/^[▲△▶◆■●※\s]+/,'').replace(/\s+/g,' ').trim();
      if (!text) return [];
      const sentences = text.split(/(?<=[.!?…])\s+/).map(s=>s.trim()).filter(s=>s.length>8);
      if (sentences.length>=2) return sentences.slice(0,3);
      if (text.length>40) {
        const words=text.split(' '), third=Math.ceil(words.length/3);
        return [words.slice(0,third).join(' '),words.slice(third,third*2).join(' '),words.slice(third*2).join(' ')]
          .filter(s=>s.length>4).slice(0,3);
      }
      return [text];
    }
    function extractDomain(url) { try{return new URL(url).hostname.replace(/^www\./,'')}catch{return '뉴스'} }
    function relativeTime(pubDate) {
      if (!pubDate) return '';
      const diff=Date.now()-new Date(pubDate).getTime(), m=Math.floor(diff/60000), h=Math.floor(diff/3600000), d=Math.floor(diff/86400000);
      if(m<1)return '방금 전'; if(m<60)return `${m}분 전`; if(h<24)return `${h}시간 전`; return `${d}일 전`;
    }
    function toKST(iso) {
      if(!iso)return ''; const d=new Date(iso); return new Date(d.getTime()+9*3600000).toISOString().replace('Z','');
    }
    function updateTimestamp() {
      const now=new Date(), p=n=>String(n).padStart(2,'0');
      document.getElementById('last-updated').textContent=
        `Last updated: ${now.getFullYear()}.${p(now.getMonth()+1)}.${p(now.getDate())} ${p(now.getHours())}:${p(now.getMinutes())}`;
    }
    function updateTabCount(cat,count) {
      const el=document.querySelector(`[data-cat="${cat}"] .tab-count`); if(el)el.textContent=count;
    }
    function escHtml(str) {
      if(!str)return ''; return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function escAttr(str) {
      if(!str)return '#'; const s=String(str).trim(); return /^https?:\/\//i.test(s)?s.replace(/"/g,'%22'):'#';
    }

    // ── RSS fetch ─────────────────────────────────────────────────────
    async function fetchNews(cat) {
      showSkeleton();
      try {
        const res  = await fetch(PROXY + encodeURIComponent(RSS_FEEDS[cat]));
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        const doc  = new DOMParser().parseFromString(text,'text/xml');
        const items = [...doc.querySelectorAll('item')].slice(0,5);
        if (!items.length) throw new Error('No items');
        const articles = items.map((item,idx) => {
          const get = tag => { const el=item.querySelector(tag); return el?el.textContent.trim():''; };
          const url = get('link')||get('guid');
          return { id:`${cat}_${idx}`, title:get('title'), source:extractDomain(url||RSS_FEEDS[cat]),
                   time:relativeTime(get('pubDate')), url, tag:categoryMeta[cat].tag, summary:parseDescription(get('description')) };
        });
        liveCache[cat] = articles;
        updateTimestamp(); updateTabCount(cat,articles.length); renderCards(articles);
        saveToArchive(articles,cat);
      } catch(err) { console.warn('[RSS]',err); showError(cat); }
    }

    async function saveToArchive(articles,cat) {
      const batchId=crypto.randomUUID();
      const {error}=await sb.from('news_archive').insert(
        articles.map(a=>({batch_id:batchId,category:cat,title:a.title,source:a.source||'',url:a.url||'',summary:a.summary||[],tag:a.tag||''}))
      );
      if(error)console.warn('[Archive]',error.message);
    }

    // ── 카테고리 전환 ─────────────────────────────────────────────────
    function switchCategory(cat, ctx=null) {
      currentCategory = cat;
      if (cat !== 'archive' && archiveTreeOpen) {
        archiveTreeOpen = false;
        document.getElementById('archive-tree-container')?.classList.add('hidden');
        const cv=document.getElementById('archive-chevron'); if(cv)cv.classList.remove('open');
        document.querySelector('[data-cat="archive"]').className='tab-inactive w-full text-left px-4 py-3 text-sm transition-all flex items-center gap-3';
      }
      document.querySelectorAll('#category-nav button[data-cat]').forEach(btn => {
        const active = btn.dataset.cat === cat;
        btn.className = `${active?'tab-active':'tab-inactive'} w-full text-left px-4 py-3 text-sm transition-all flex items-center gap-3`;
        const badge = btn.querySelector('span.ml-auto');
        if (badge) badge.className = `ml-auto badge ${active?'badge-brand':'badge-gray'}`;
      });
      document.getElementById('cat-title').textContent    = categoryMeta[cat].title;
      document.getElementById('cat-subtitle').textContent = categoryMeta[cat].subtitle;
      document.getElementById('sort-control').style.display = (cat==='discussion'||cat==='archive')?'none':'flex';
      if (cat==='discussion') { articleContext=ctx; fetchDiscussions(); }
      else if (cat==='archive') { showArchiveHint(); }
      else if (liveCache[cat]) { renderCards(liveCache[cat]); }
      else { fetchNews(cat); }
    }

    // ── 아카이브 트리 토글 ────────────────────────────────────────────
    function toggleArchiveTree() {
      archiveTreeOpen = !archiveTreeOpen;
      const container = document.getElementById('archive-tree-container');
      const chevron   = document.getElementById('archive-chevron');
      const btn       = document.querySelector('[data-cat="archive"]');
      if (archiveTreeOpen) {
        container.classList.remove('hidden');
        chevron.classList.add('open');
        document.querySelectorAll('#category-nav button[data-cat]').forEach(b => {
          const active = b.dataset.cat==='archive';
          b.className = `${active?'tab-active':'tab-inactive'} w-full text-left px-4 py-3 text-sm transition-all flex items-center gap-3`;
          const badge=b.querySelector('span.ml-auto'); if(badge)badge.className=`ml-auto badge ${active?'badge-brand':'badge-gray'}`;
        });
        currentCategory='archive';
        document.getElementById('cat-title').textContent    = categoryMeta.archive.title;
        document.getElementById('cat-subtitle').textContent = categoryMeta.archive.subtitle;
        document.getElementById('sort-control').style.display = 'none';
        showArchiveHint(); renderArchiveTree();
      } else {
        container.classList.add('hidden'); chevron.classList.remove('open');
        btn.className='tab-inactive w-full text-left px-4 py-3 text-sm transition-all flex items-center gap-3';
        Object.values(archiveTreeCats).forEach(c=>{c.isOpen=false;c.openDate=null;});
      }
    }

    // ── 아카이브 트리: 카테고리 토글 ─────────────────────────────────
    async function toggleArchiveTreeCat(cat) {
      const state = archiveTreeCats[cat];
      state.isOpen = !state.isOpen;
      if (state.isOpen && state.dateList===null) {
        state.dateList='loading'; renderArchiveTree();
        const {data,error}=await sb.from('news_archive').select('batch_id,saved_at').eq('category',cat).order('saved_at',{ascending:false}).limit(2000);
        if(error||!data){ state.dateList=[]; }
        else {
          const batchMap={};
          data.forEach(row=>{
            if(!batchMap[row.batch_id])batchMap[row.batch_id]={batch_id:row.batch_id,saved_at:row.saved_at,count:0};
            batchMap[row.batch_id].count++;
          });
          const byDate={};
          Object.values(batchMap).forEach(b=>{
            const kst=toKST(b.saved_at), date=kst.slice(0,10);
            if(!byDate[date])byDate[date]=[]; byDate[date].push({...b,kst});
          });
          state.dateList=Object.entries(byDate).sort(([a],[b])=>b.localeCompare(a))
            .map(([date,batches])=>({date,batches:batches.sort((a,b)=>b.saved_at.localeCompare(a.saved_at))}));
        }
      }
      renderArchiveTree();
    }

    function toggleArchiveTreeDate(cat,date) {
      const state=archiveTreeCats[cat]; state.openDate=state.openDate===date?null:date; renderArchiveTree();
    }

    function renderArchiveTree() {
      const body=document.getElementById('archive-tree-body'); if(!body)return;
      const catList=[{key:'economy',label:'경제',icon:'📈'},{key:'tech',label:'테크',icon:'💡'},{key:'risk',label:'리스크',icon:'🛡️'}];
      body.innerHTML=catList.map(c=>{
        const state=archiveTreeCats[c.key], catOpen=state.isOpen;
        let childrenHtml='';
        if(catOpen){
          if(state.dateList==='loading'){
            childrenHtml=`<div class="pl-8 py-2 text-xs" style="color:#9ca3af">불러오는 중…</div>`;
          } else if(!state.dateList||!state.dateList.length){
            childrenHtml=`<div class="pl-8 py-2 text-xs" style="color:#9ca3af">저장된 데이터 없음</div>`;
          } else {
            childrenHtml=state.dateList.map(({date,batches})=>{
              const dateOpen=state.openDate===date;
              const batchRows=dateOpen?batches.map(b=>`
                <div class="tree-row flex items-center gap-2 pl-12 pr-3 py-1.5 text-xs cursor-pointer"
                  style="color:#6b7280" onclick="loadBatchFromTree('${b.batch_id}','${c.key}','${escAttr(date)}')">
                  <span class="w-1.5 h-1.5 rounded-full flex-shrink-0" style="background:#6366f1;opacity:.6"></span>
                  <span>${b.kst.slice(11,16)}</span>
                  <span class="ml-auto" style="color:#6366f1;font-weight:600">${b.count}건</span>
                </div>`).join(''):'';
              return `
                <div>
                  <div class="tree-row flex items-center gap-1.5 pl-7 pr-3 py-1.5 text-xs cursor-pointer select-none"
                    style="color:#6b7280" onclick="toggleArchiveTreeDate('${c.key}','${escAttr(date)}')">
                    <svg class="tree-chevron w-3 h-3 flex-shrink-0 ${dateOpen?'open':''}" style="color:#9ca3af"
                      fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                    </svg>
                    <span class="truncate flex-1">📅 ${escHtml(date)}</span>
                    <span style="color:#9ca3af">${batches.length}</span>
                  </div>
                  ${batchRows}
                </div>`;
            }).join('');
          }
        }
        return `
          <div>
            <div class="tree-row flex items-center gap-2 pl-4 pr-3 py-2 text-xs cursor-pointer select-none"
              style="color:#6b7280" onclick="toggleArchiveTreeCat('${c.key}')">
              <svg class="tree-chevron w-3.5 h-3.5 flex-shrink-0 ${catOpen?'open':''}" style="color:#9ca3af"
                fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
              </svg>
              <span class="text-sm">${c.icon}</span>
              <span style="font-weight:500">${c.label}</span>
            </div>
            ${catOpen?`<div>${childrenHtml}</div>`:''}
          </div>`;
      }).join('');
    }

    async function loadBatchFromTree(batchId,cat,date) {
      currentCategory='archive';
      document.getElementById('cat-title').textContent    = categoryMeta.archive.title;
      document.getElementById('cat-subtitle').textContent = categoryMeta.archive.subtitle;
      document.getElementById('sort-control').style.display='none';
      await loadBatch(batchId,date);
    }

    function showArchiveHint() {
      document.getElementById('news-container').innerHTML=`
        <div class="glass-card p-16 text-center" style="animation:fadeIn .2s ease both">
          <div class="text-5xl mb-4">📁</div>
          <p class="text-sm mb-1" style="font-weight:600;color:#6366f1">왼쪽 트리에서 카테고리와 날짜를 선택하세요</p>
          <p class="text-xs" style="color:#9ca3af">카테고리 → 날짜 → 수집 시간 순으로 펼쳐서 선택할 수 있습니다</p>
        </div>`;
    }

    async function loadBatch(batchId,date) {
      const container=document.getElementById('news-container');
      container.innerHTML=archiveBackBtn()+skeletonList(3,true);
      const {data,error}=await sb.from('news_archive').select('*').eq('batch_id',batchId).order('id');
      if(error||!data?.length){ container.innerHTML=archiveBackBtn()+errorBox('기사를 불러오지 못했습니다.'); return; }
      const kst=toKST(data[0].saved_at), label=CAT_LABELS[data[0].category]||data[0].category, icon=CAT_ICONS[data[0].category]||'📰';
      container.innerHTML=`
        <div class="flex items-center gap-2 mb-2 flex-wrap">
          ${archiveBackBtn()}
          <span style="color:#d1d5db" class="text-xs">|</span>
          <span class="text-xs" style="color:#9ca3af">${icon} ${escHtml(label)} · ${escHtml(kst.slice(0,16).replace('T',' '))}</span>
        </div>
        <div class="flex flex-col gap-4">${data.map((item,idx)=>archiveCard(item,idx)).join('')}</div>`;
    }

    function archiveBackBtn() {
      return `<button onclick="showArchiveHint()" class="inline-flex items-center gap-1 text-xs transition" style="color:#6366f1"

      </button>`;
    }

    function openDiscussion(title,url) { switchCategory('discussion',{title,url}); }

    // ── 토론 게시판 ───────────────────────────────────────────────────
    async function fetchDiscussions() {
      const container=document.getElementById('news-container');
      container.innerHTML=discussionFormHtml()+`<div id="disc-list" class="flex flex-col gap-3">${skeletonList(3)}</div>`;
      const textarea=document.getElementById('disc-content');
      if(textarea)textarea.addEventListener('input',()=>{
        const c=document.getElementById('disc-char-count'); if(c)c.textContent=`${textarea.value.length} / 500`;
      });
      let query=sb.from('discussions').select('*').order('created_at',{ascending:false}).limit(50);
      if(articleContext)query=query.eq('news_title',articleContext.title);
      const {data,error}=await query;
      if(error){document.getElementById('disc-list').innerHTML=errorBox(error.message);return;}
      updateTabCount('discussion',data.length); renderDiscussions(data);
    }

          <div class="flex-1 min-w-0">

            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">

    function clearArticleContext() { articleContext=null; fetchDiscussions(); }

    function filterDiscussion(mode) {
      document.getElementById('tab-article')?.classList.replace(mode==='article'?'disc-tab-inactive':'disc-tab-active',mode==='article'?'disc-tab-active':'disc-tab-inactive');
      document.getElementById('tab-all')?.classList.replace(mode==='all'?'disc-tab-inactive':'disc-tab-active',mode==='all'?'disc-tab-active':'disc-tab-inactive');
      const list=document.getElementById('disc-list'); if(!list)return;
      list.innerHTML=skeletonList(3);
      let query=sb.from('discussions').select('*').order('created_at',{ascending:false}).limit(50);
      if(mode==='article'&&articleContext)query=query.eq('news_title',articleContext.title);
      query.then(({data,error})=>{
        if(error){list.innerHTML=errorBox(error.message);return;}
        updateTabCount('discussion',data.length); renderDiscussions(data);
      });
    }

      const list=document.getElementById('disc-list'); if(!list)return;
      if(!posts?.length){
        list.innerHTML=`<div class="glass-card p-16 text-center">
          <div class="text-4xl mb-3">💬</div>
          <p class="text-xs" style="color:#9ca3af">${articleContext?'이 기사에 대한 토론이 없습니다.<br>첫 번째 의견을 남겨보세요!':'첫 번째 게시글을 작성해보세요!'}</p>
        </div>`;

          <div class="mb-2 flex items-center gap-1.5">
            <svg class="w-3 h-3" style="color:#9ca3af" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>

            <span class="text-xs truncate max-w-xs" style="color:#9ca3af">${escHtml(p.news_title)}</span>

            style="animation:fadeIn .25s ease both;animation-delay:${i*.05}s">

                <span class="text-sm" style="font-weight:600;color:#1e1b4b">${escHtml(p.nickname)}</span>

                <svg class="w-3.5 h-3.5" fill="${liked?'currentColor':'none'}" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"

                <span class="like-count">${p.likes||0}</span>

              id="disc-content-${p.id}" data-original="${escHtml(p.content)}">${escHtml(p.content)}</p>

                class="text-xs transition flex items-center gap-1" style="color:#9ca3af"
                onmouseenter="this.style.color='#818cf8'" onmouseleave="this.style.color='#334155'">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>

                onmouseenter="this.style.color='#ef4444'" onmouseleave="this.style.color='#334155'">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>삭제
              </button>

    async function submitDiscussion() {
      const nickname=(document.getElementById('disc-nickname')?.value||'').trim();
      const content=(document.getElementById('disc-content')?.value||'').trim();
      if(!nickname){alert('닉네임을 입력해주세요.');return;}
      if(!content){alert('내용을 입력해주세요.');return;}
      const btn=document.querySelector('[onclick="submitDiscussion()"]');
      if(btn){btn.disabled=true;btn.textContent='게시 중...';}
      const payload={nickname,content,likes:0};
      if(articleContext){payload.news_title=articleContext.title;payload.news_url=articleContext.url||'';}
      const {error}=await sb.from('discussions').insert(payload);
      if(error){alert('게시 실패: '+error.message);if(btn){btn.disabled=false;btn.textContent='게시하기';}}
      else await fetchDiscussions();
    }

    async function toggleDiscLike(id,btn) {
      if(likedPosts.has(id))return;
      likedPosts.add(id); localStorage.setItem('likedPosts',JSON.stringify([...likedPosts]));
      const countEl=btn.querySelector('.like-count'), newCount=parseInt(btn.dataset.likes||'0')+1;
      if(countEl)countEl.textContent=newCount; btn.dataset.likes=newCount;
      btn.style.cssText='border-color:#6366f1;color:#6366f1;background:rgba(99,102,241,.1)';
      btn.querySelector('svg').setAttribute('fill','currentColor');
      await sb.from('discussions').update({likes:newCount}).eq('id',id);
    }

    // ── 토론 수정/삭제 ────────────────────────────────────────────────
    function editDiscussion(id) {
      const contentEl=document.getElementById(`disc-content-${id}`); if(!contentEl)return;
      const original=contentEl.dataset.original||contentEl.textContent;
      contentEl.outerHTML=`
        <div id="disc-edit-${id}" class="mt-1" data-original="${escHtml(original)}">
          <textarea id="disc-edit-ta-${id}" maxlength="500" rows="3" class="dark-input"
            style="border-color:rgba(99,102,241,.4)">${escHtml(original)}</textarea>
          <div class="flex items-center gap-2 mt-2">
            <button onclick="saveDiscussionEdit('${id}')" class="btn-primary btn-sm">저장</button>
            <button onclick="cancelDiscussionEdit('${id}')" class="text-xs px-3 py-1.5 rounded-lg transition"
              style="color:#9ca3af;border:1px solid rgba(99,102,241,.2)"
              onmouseenter="this.style.color='#94a3b8'" onmouseleave="this.style.color='#475569'">취소</button>
          </div>
        </div>`;
    }

    async function saveDiscussionEdit(id) {
      const ta=document.getElementById(`disc-edit-ta-${id}`); if(!ta)return;
      const newContent=ta.value.trim();
      if(!newContent){alert('내용을 입력해주세요.');return;}
      const {error}=await sb.from('discussions').update({content:newContent}).eq('id',id);
      if(error){alert('수정 실패: '+error.message);return;}
      const editEl=document.getElementById(`disc-edit-${id}`);
      if(editEl)editEl.outerHTML=`<p class="text-sm leading-relaxed whitespace-pre-wrap mt-1" style="color:#6b7280"
        id="disc-content-${id}" data-original="${escHtml(newContent)}">${escHtml(newContent)}</p>`;
    }

    function cancelDiscussionEdit(id) {
      const editEl=document.getElementById(`disc-edit-${id}`); if(!editEl)return;
      const text=editEl.dataset.original||'';
      editEl.outerHTML=`<p class="text-sm leading-relaxed whitespace-pre-wrap mt-1" style="color:#6b7280"
        id="disc-content-${id}" data-original="${escHtml(text)}">${escHtml(text)}</p>`;
    }

    async function deleteDiscussion(id) {
      if(!confirm('이 게시글을 삭제하시겠습니까?'))return;
      const {error}=await sb.from('discussions').delete().eq('id',id);
      if(error){alert('삭제 실패: '+error.message);return;}
      document.querySelector(`article[data-disc-id="${id}"]`)?.remove();
      const list=document.getElementById('disc-list');
      if(list&&!list.querySelector('article')){
        list.innerHTML=`<div class="glass-card p-16 text-center">
          <div class="text-4xl mb-3">💬</div>
          <p class="text-xs" style="color:#9ca3af">게시글이 없습니다.</p></div>`;
      }
    }

    // ── 북마크 ────────────────────────────────────────────────────────
    function showBookmarks() {
      const saved=Object.values(liveCache).flat().filter(n=>bookmarkedIds.has(n.id));
      document.getElementById('cat-title').textContent='북마크';
      document.getElementById('cat-subtitle').textContent='저장한 뉴스 모아보기';
      document.querySelectorAll('#category-nav button[data-cat]').forEach(btn=>{
        btn.className='tab-inactive w-full text-left px-4 py-3 text-sm transition-all flex items-center gap-3';
        const badge=btn.querySelector('span.ml-auto'); if(badge)badge.className='ml-auto badge badge-gray';
      });
      if(archiveTreeOpen){
        archiveTreeOpen=false;
        document.getElementById('archive-tree-container')?.classList.add('hidden');
        document.getElementById('archive-chevron')?.classList.remove('open');
      }
      currentCategory=null;
      document.getElementById('sort-control').style.display='flex';
      renderCards(saved,true);
    }

    function toggleBookmark(id,btn) {
      if(bookmarkedIds.has(id)){
        bookmarkedIds.delete(id); btn.classList.replace('bookmark-active','bookmark-inactive');
        btn.querySelector('svg').setAttribute('fill','none');
        btn.querySelector('.bm-label').textContent='북마크'; btn.title='북마크 추가';
      } else {
        bookmarkedIds.add(id); btn.classList.replace('bookmark-inactive','bookmark-active');
        btn.querySelector('svg').setAttribute('fill','currentColor');
        btn.querySelector('.bm-label').textContent='북마크됨'; btn.title='북마크 제거';
      }
    }

    // ── 카드 렌더링 ───────────────────────────────────────────────────
    function renderCards(articles, isBookmark=false) {
      const container=document.getElementById('news-container');
      if(!articles?.length){
        container.innerHTML=`
          <div class="glass-card p-16 text-center">
            <div class="text-4xl mb-3">🔖</div>
            <p class="text-xs" style="color:#9ca3af">${isBookmark?'저장된 북마크가 없습니다.':'뉴스가 없습니다.'}</p>
          </div>`;
        return;
      }
      container.innerHTML=articles.map((news,idx)=>{
        const bookmarked=bookmarkedIds.has(news.id);
        const lines=news.summary?.length?news.summary:['요약 정보를 불러올 수 없습니다.'];
        return `
          <article data-id="${news.id}" class="glass-card p-6"
            style="animation:fadeIn .25s ease both;animation-delay:${idx*.06}s">
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 mb-2 flex-wrap">
                <span class="badge badge-brand">${escHtml(news.tag)}</span>
                <span class="text-xs" style="color:#9ca3af">${escHtml(news.source)}</span>
                <span class="text-xs" style="color:#d1d5db">|</span>
                <span class="text-xs" style="color:#9ca3af">${escHtml(news.time)}</span>
              </div>
              <h3 class="text-sm leading-snug mb-4" style="font-weight:700;color:#1e1b4b">${escHtml(news.title)}</h3>
              <div class="glass-inner px-4 py-3 mb-4">
                <p class="text-xs mb-2 flex items-center gap-1" style="font-weight:600;color:#6b7280">
                  <svg class="w-3.5 h-3.5" style="color:#6366f1" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/>
                    <path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/>
                  </svg>뉴스 요약
                </p>
                <ul class="space-y-1.5">${lines.map(l=>`
                  <li class="flex items-start gap-2 text-xs leading-relaxed" style="color:#6b7280">
                    <span class="mt-1.5 w-1.5 h-1.5 rounded-full flex-shrink-0" style="background:#6366f1;opacity:.7"></span>
                    <span>${escHtml(l)}</span>
                  </li>`).join('')}</ul>
              </div>
              <div class="flex items-center gap-2 flex-wrap">
                <a href="${escAttr(news.url)}" target="_blank" rel="noopener noreferrer" class="btn-primary btn-sm">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
                  </svg>원본 기사 보기
                </a>
                <button onclick="toggleBookmark('${news.id}',this)" title="${bookmarked?'북마크 제거':'북마크 추가'}"
                  class="${bookmarked?'bookmark-active':'bookmark-inactive'} inline-flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-lg transition"
                  style="border:1px solid rgba(99,130,210,.15)">
                  <svg class="w-4 h-4" fill="${bookmarked?'currentColor':'none'}" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/>
                  </svg>
                  <span class="bm-label">${bookmarked?'북마크됨':'북마크'}</span>
                </button>
              </div>
            </div>
          </article>`;
      }).join('');
    }

    // ── 스켈레톤 / 에러 ──────────────────────────────────────────────
    function showSkeleton() { document.getElementById('news-container').innerHTML=skeletonList(5,true); }

    function skeletonList(n=3,isNews=false) {
      if(isNews)return Array(n).fill(0).map(()=>`
        <div class="glass-card p-6">
          <div class="flex gap-2 mb-3"><div class="skeleton-line h-5 w-14"></div><div class="skeleton-line h-5 w-24 ml-1"></div></div>
          <div class="skeleton-line h-4 w-full mb-2"></div><div class="skeleton-line h-4 w-4/5 mb-4"></div>
          <div class="glass-inner p-3 mb-4 space-y-2">
            <div class="skeleton-line h-3 w-20 mb-3"></div>
            <div class="skeleton-line h-3 w-full"></div><div class="skeleton-line h-3 w-full"></div><div class="skeleton-line h-3 w-3/4"></div>
          </div>
          <div class="flex gap-2"><div class="skeleton-line h-7 w-28"></div><div class="skeleton-line h-7 w-20"></div></div>
        </div>`).join('');
      return Array(n).fill(0).map(()=>`
        <div class="glass-card p-4">
          <div class="flex items-center gap-3"><div class="skeleton-line w-4 h-4 rounded-full"></div><div class="skeleton-line h-4 w-32"></div></div>
        </div>`).join('');
    }

    function showError(cat) {
      document.getElementById('news-container').innerHTML=`
        <div class="glass-card p-16 text-center">
          <div class="text-4xl mb-3">⚠️</div>
          <p class="text-sm mb-1" style="font-weight:600;color:#1e1b4b">뉴스를 불러오지 못했습니다</p>
          <p class="text-xs mb-5" style="color:#9ca3af">RSS 서버 연결 실패. 잠시 후 다시 시도해주세요.</p>
          <button onclick="fetchNews('${escAttr(cat)}')" class="btn-primary btn-sm">다시 시도</button>
        </div>`;
    }

    function errorBox(msg) {
      return `<div class="glass-card p-10 text-center text-xs" style="color:#9ca3af">${escHtml(msg)}</div>`;
    }

    fetchNews('economy');
  </script>
</body>
</html>
